<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow - Fixed Version</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-black text-zinc-100 font-sans">
  <div class="max-w-md mx-auto min-h-screen bg-black border-x border-zinc-900 pb-26">
    <main id="main-content" class="p-5">
      <section id="view-dashboard" class="tab-view"> </section>
      <section id="view-reports" class="tab-view hidden"> </section>
      <section id="view-profile" class="tab-view hidden"> </section>
      <section id="view-trades" class="tab-view hidden"> </section>
      <section id="view-settings" class="tab-view hidden"> </section>
    </main>
  </div>

  <script>
    // แก้ไข: เพิ่มคำสั่งให้หน้าจอเริ่มต้น (Dashboard) แสดงผลทันทีเมื่อเปิดไฟล์
    window.onload = function() {
      document.getElementById('view-dashboard').classList.remove('hidden');
    };

    // ฟังก์ชันเปลี่ยนหน้าให้ทำงานถูกต้อง
    window.changeMenuTab = function(tabName) {
      document.querySelectorAll('.tab-view').forEach(view => view.classList.add('hidden'));
      const target = document.getElementById(`view-${tabName}`);
      if (target) target.classList.remove('hidden');
    };
  </script>
</body>
</html>
