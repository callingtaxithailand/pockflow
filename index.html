<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Tracker</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; font-weight: 600; }
        .container { max-width: 100%; width: 100%; margin: auto; }
        h1 { color: #00d4ff; font-size: 1.5rem; text-align: center; }
        .summary-box { background: #111; padding: 10px; border-radius: 8px; border: 2px solid #007bff; color: #00d4ff; font-size: 0.9rem; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #333; padding: 8px 4px; text-align: left; }
        .clickable { color: #00d4ff; text-decoration: underline; cursor: pointer; }
        .btn-action { cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding: 15px; overflow-y: auto; z-index: 1000; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #555; border-radius: 5px; font-size: 1rem; }
        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: #007bff; color: white; border: none; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div class="summary-box">รวมยอดซื้อ: <span id="sum-buy" style="color:#fff;">0</span></div>
    <div id="main-table"></div>
</div>

<button class="add-btn" onclick="openForm()">+</button>

<div id="detail-modal" class="modal">
    <h2 id="modal-title" style="color:#00d4ff;"></h2>
    <div id="modal-body"></div>
    <button onclick="closeModal('detail-modal')" style="width:100%; padding:15px; margin-top:20px; background:#444; color:#fff; border:none; border-radius:5px;">ปิดหน้าต่าง</button>
</div>

<div id="form-modal" class="modal">
    <h2 id="form-title" style="color:#00d4ff;">เพิ่มธุรกรรม</h2>
    <input type="hidden" id="edit-id">
    <input type="date" id="date">
    <select id="type"><option value="ซื้อ">ซื้อ</option><option value="ขาย">ขาย</option><option value="ปันผล">ปันผล</option></select>
    <input type="text" id="name" placeholder="ชื่อหุ้น">
    <input type="number" id="price" placeholder="จำนวนเงิน">
    <button onclick="saveData()" style="width:100%; padding:15px; background:#007bff; border:none; color:white; border-radius:5px; font-weight:800;">บันทึกข้อมูล</button>
    <button onclick="closeModal('form-modal')" style="width:100%; padding:15px; margin-top:10px; background:#444; color:white; border:none; border-radius:5px;">ยกเลิก</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function renderMain() {
        let groups = {};
        data.forEach(i => {
            if(!groups[i.name]) groups[i.name] = { buy:0, sell:0, div:0 };
            if(i.type === 'ซื้อ') groups[i.name].buy += Number(i.price);
            if(i.type === 'ขาย') groups[i.name].sell += Number(i.price);
            if(i.type === 'ปันผล') groups[i.name].div += Number(i.price);
        });

        let html = `<table><tr><th>หุ้น</th><th>ซื้อ</th><th>ขาย</th><th>ปันผล</th></tr>`;
        for(let name in groups) {
            html += `<tr><td class="clickable" onclick="showDetail('${name}')">${name}</td><td>${groups[name].buy}</td><td>${groups[name].sell}</td><td>${groups[name].div}</td></tr>`;
        }
        document.getElementById('main-table').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = data.filter(i => i.type === 'ซื้อ').reduce((s, i) => s + Number(i.price), 0);
    }

    function showDetail(name) {
        let items = data.filter(i => i.name === name);
        let html = `<table><tr><th>วันที่</th><th>ประเภท</th><th>เงิน</th><th>จัด</th></tr>`;
        items.forEach(i => {
            html += `<tr><td>${i.date}</td><td>${i.type}</td><td>${i.price}</td>
                     <td><span class="btn-action" onclick="editItem('${i.id}')">✏️</span> <span class="btn-action" onclick="deleteItem('${i.id}')">❌</span></td></tr>`;
        });
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-body').innerHTML = html + `</table>`;
        document.getElementById('detail-modal').style.display = 'block';
    }

    function saveData() {
        const id = document.getElementById('edit-id').value;
        const item = { id: id || Date.now().toString(), date: document.getElementById('date').value, type: document.getElementById('type').value, name: document.getElementById('name').value, price: document.getElementById('price').value };
        if(id) data = data.map(i => i.id === id ? item : i);
        else data.push(item);
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal('form-modal'); renderMain();
    }

    function editItem(id) {
        const item = data.find(i => i.id === id);
        document.getElementById('edit-id').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('type').value = item.type;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('detail-modal').style.display = 'none';
        document.getElementById('form-modal').style.display = 'block';
    }

    function deleteItem(id) {
        if(confirm('ลบรายการนี้?')) {
            data = data.filter(i => i.id !== id);
            localStorage.setItem('myPortfolio', JSON.stringify(data));
            closeModal('detail-modal'); renderMain();
        }
    }

    function openForm() { document.getElementById('form-modal').style.display = 'block'; }
    function closeModal(id) { document.getElementById('edit-id').value = ''; document.getElementById(id).style.display = 'none'; }
    window.onload = renderMain;
</script>
</body>
</html>
