<!DOCTYPE html>
<html>
<head>
    <style>
        .card { border: 3px solid; padding: 10px; margin: 10px; border-radius: 8px; }
        .buy { border-color: green; }
        .sell { border-color: red; }
        .dividend { border-color: blue; }
    </style>
</head>
<body>
    <h2>บันทึกรายการลงทุน</h2>
    <form id="transactionForm">
        <input type="date" id="date" required>
        <select id="type">
            <option value="buy">ซื้อ</option>
            <option value="sell">ขาย</option>
            <option value="dividend">ปันผล</option>
        </select>
        <input type="text" id="mainCat" placeholder="หมวดหมู่หลัก" required>
        <input type="text" id="subCat" placeholder="หมวดหมู่ย่อย" required>
        <input type="text" id="owner" placeholder="ซื้อให้ใคร" required>
        <input type="number" id="price" placeholder="ราคา" required>
        <button type="submit">บันทึก</button>
    </form>

    <div id="displayArea"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
