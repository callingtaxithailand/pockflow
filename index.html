<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow - Portfolio Manager</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; padding-bottom: 70px; }
        .page { display: none; }
        .active { display: block; }
        
        /* สไตล์ตารางและฟอร์ม */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #1a1a1a; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #aaa; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        .btn-add { background: #ffb300; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; color: #000; margin-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <h2>Dashboard</h2>
        <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <p>เงินปันผลสะสม: ฿0.00</p>
            <p>มูลค่าพอร์ต: ฿0.00</p>
        </div>
        <button class="btn-add" onclick="showPage('page-form')">+ บันทึกรายการใหม่</button>
    </div>

    <div id="page-form" class="page">
        <h2>บันทึกรายการ</h2>
        <div class="form-group"><label>ประเภท</label>
            <select id="type">
                <option value="ซื้อหุ้น">ซื้อหุ้น</option>
                <option value="ขายหุ้น">ขายหุ้น</option>
                <option value="รับเงินปันผล">รับเงินปันผล</option>
            </select>
        </div>
        <div class="form-group"><label>วันที่</label><input type="date" id="date"></div>
        <div class="form-group"><label>หุ้น</label><input type="text" id="stock" placeholder="เช่น TISCO, VOO"></div>
        <div class="form-group"><label>จำนวนเงิน</label><input type="number" id="amount" placeholder="0.00"></div>
        <button class="btn-add" onclick="saveData()">บันทึกรายการ</button>
    </div>

    <div id="page-report" class="page">
        <h2>รายงานการซื้อขาย</h2>
        <select id="stockFilter" onchange="filterStock()">
            <option value="all">ทั้งหมด</option>
            <option value="TISCO">TISCO</option>
            <option value="SCB">SCB</option>
            <option value="VOO">VOO</option>
        </select>
        <table>
            <thead><tr><th>ประเภท</th><th>หุ้น</th><th>ยอดเงิน</th></tr></thead>
            <tbody id="reportTable"></tbody>
        </table>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showPage('page-dashboard')">📊<br>แดชบอร์ด</div>
        <div class="nav-item" onclick="showPage('page-form')">📝<br>บันทึก</div>
        <div class="nav-item" onclick="showPage('page-report')">📈<br>รายงาน</div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function saveData() {
            alert("บันทึกข้อมูลเรียบร้อย!");
            showPage('page-report');
        }
        function filterStock() {
            console.log("กรองข้อมูล: " + document.getElementById('stockFilter').value);
        }
    </script>
</body>
</html>
