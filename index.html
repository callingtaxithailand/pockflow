<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ใส่ Config ของคุณที่นี่
        const firebaseConfig = { apiKey: "YOUR_API_KEY", projectId: "YOUR_PROJECT_ID", authDomain: "YOUR_PROJECT_ID.firebaseapp.com", storageBucket: "YOUR_PROJECT_ID.appspot.com", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID" };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.saveData = async () => {
            await addDoc(collection(db, "transactions"), {
                asset: document.getElementById('asset').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value,
                date: document.getElementById('date').value || new Date().toISOString().split('T')[0]
            });
            alert("บันทึกสำเร็จ");
        };

        window.del = async (id) => { await deleteDoc(doc(db, "transactions", id)); };

        onSnapshot(query(collection(db, "transactions"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('report');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="bg-gray-800 p-4 mb-2 flex justify-between"><div>${data.asset} (${data.date})<br><b>${data.amount} (${data.type})</b></div><button onclick="del('${d.id}')" class="bg-red-900 p-2">ลบ</button></div>`;
            });
        });
    </script>
</head>
<body class="bg-black text-white p-4">
    <h1 class="text-4xl font-bold text-center">PocketFlow</h1>
    <input id="date" type="date" class="w-full p-4 mb-2 bg-black border text-white">
    <input id="asset" type="text" placeholder="ชื่อหุ้น" class="w-full p-4 mb-2 bg-black border text-white">
    <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-4 mb-2 bg-black border text-white">
    <select id="type" class="w-full p-4 mb-2 bg-black border text-white"><option value="ซื้อ">ซื้อ</option><option value="ขาย">ขาย</option><option value="ปันผล">ปันผล</option></select>
    <button onclick="saveData()" class="w-full bg-blue-600 p-4 font-bold">บันทึกข้อมูล</button>
    <div id="report" class="mt-4"></div>
</body>
</html>
