<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Manager</title>
    <style>
        :root { --primary: #007bff; --accent: #ff007f; --bg: #000; --text: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        h1 { color: #00d4ff; text-align: center; }
        
        /* ปุ่มนำทาง */
        .nav-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .nav-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nav-btn.active { background: var(--primary); border-color: var(--primary); }
        
        .summary-box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid var(--primary); text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #00d4ff; border-bottom: 2px solid #333; padding: 10px; }
        td { border-bottom: 1px solid #333; padding: 12px 5px; }
        
        #add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; border: none; color: white; font-size: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(255,0,127,0.5); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); padding: 20px; z-index: 100; overflow-y: auto; }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #555; color: #fff; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div class="nav-group">
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">ตปท</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">ทอง</button>
    </div>

    <div class="summary-box">
        รวมยอดซื้อ: <span id="sum-buy" style="color: #00d4ff; font-size: 1.2rem;">0</span> บาท
    </div>

    <div id="content-area"></div>
</div>

<button id="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div id="modal-body" class="container"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function showSection(type) {
        localStorage.setItem('activePage', type);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + type));
        
        let filtered = data.filter(i => i.category === type).sort((a,b) => new Date(b.date) - new Date(a.date));
        let html = `<table><tr><th>วันที่</th><th>ชื่อ</th><th>เงิน</th><th></th></tr>`;
        filtered.forEach(i => {
            html += `<tr><td>${i.date.slice(5)}</td><td onclick="openDetail('${i.name}')" style="color:#00d4ff">${i.name}</td><td>${i.price}</td>
                <td><button onclick="editItem('${i.id}')" style="background:none; border:none; color:lime;">แก้</button></td></tr>`;
        });
        document.getElementById('content-area').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = filtered.filter(i => i.txType === 'buy').reduce((s, i) => s + Number(i.price), 0).toLocaleString();
    }

    function openModal(item = null) {
        const isEdit = !!item;
        document.getElementById('modal-body').innerHTML = `
            <h2 style="color:#fff">${isEdit ? 'แก้ไข' : 'เพิ่มรายการ'}</h2>
            <input type="date" id="date" value="${isEdit ? item.date : new Date().toISOString().split('T')[0]}">
            <select id="type-select">
                <option value="buy" ${isEdit && item.txType === 'buy' ? 'selected' : ''}>ซื้อ</option>
                <option value="sell" ${isEdit && item.txType === 'sell' ? 'selected' : ''}>ขาย</option>
                <option value="dividend" ${isEdit && item.txType === 'dividend' ? 'selected' : ''}>ปันผล</option>
            </select>
            <input type="text" id="name" placeholder="ชื่อหุ้น" value="${isEdit ? item.name : ''}">
            <input type="number" id="price" placeholder="จำนวนเงิน" value="${isEdit ? item.price : ''}">
            <button class="nav-btn" style="width:100%; background:var(--primary)" onclick="${isEdit ? `updateData('${item.id}')` : 'saveData()'}">บันทึก</button>
            <button class="nav-btn" style="width:100%; margin-top:10px; background:#444" onclick="closeModal()">ปิด</button>
        `;
        document.getElementById('modal').style.display = 'block';
    }

    function saveData() {
        const item = { id: Date.now().toString(), category: localStorage.getItem('activePage') || 'thai', txType: document.getElementById('type-select').value, date: document.getElementById('date').value, name: document.getElementById('name').value, price: document.getElementById('price').value };
        data.push(item);
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal();
        showSection(item.category);
    }

    function editItem(id) { openModal(data.find(i => i.id === id)); }

    function updateData(id) {
        let index = data.findIndex(i => i.id === id);
        data[index] = { id, category: data[index].category, txType: document.getElementById('type-select').value, date: document.getElementById('date').value, name: document.getElementById('name').value, price: document.getElementById('price').value };
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal();
        showSection(data[index].category);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = () => showSection(localStorage.getItem('activePage') || 'thai');
</script>
</body>
</html>
