<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Manager</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
        .active { background: #007bff; border-color: #007bff; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 12px 5px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); padding: 20px; z-index: 200; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #555; color: #fff; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; }
        .action-btn { cursor: pointer; padding: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button class="nav-btn" id="btn-thai" onclick="setCategory('thai')">ไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="setCategory('foreign')">ตปท</button>
        <button class="nav-btn" id="btn-gold" onclick="setCategory('gold')">ทอง</button>
    </div>
    <div style="background:#111; padding:15px; border-radius:10px; border: 1px solid #007bff;">
        ยอดซื้อรวม: <span id="sum-buy">0</span>
    </div>
    <div id="content-area">กำลังโหลดข้อมูล...</div>
</div>

<button onclick="openModal()" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:#ff007f; border:none; color:white; font-size:30px;">+</button>

<div id="modal" class="modal">
    <div id="modal-body" class="container"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        // ใส่ Config ของคุณที่นี่
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentCategory = 'thai';

    window.setCategory = (cat) => {
        currentCategory = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        loadData();
    };

    window.loadData = async () => {
        const q = query(collection(db, "portfolio"), where("category", "==", currentCategory), orderBy("date", "desc"));
        const querySnapshot = await getDocs(q);
        let html = `<table><tr><th>วันที่</th><th>ชื่อ</th><th>เงิน</th><th></th></tr>`;
        let totalBuy = 0;
        querySnapshot.forEach((doc) => {
            const i = doc.data();
            if(i.txType === 'buy') totalBuy += Number(i.price);
            html += `<tr><td>${i.date.slice(5)}</td><td>${i.name}</td><td>${i.price}</td>
                <td>
                    <span class="action-btn" style="color:#0f0" onclick="editItem('${doc.id}', ${JSON.stringify(i).replace(/"/g, '&quot;')})">[แก้]</span>
                    <span class="action-btn" style="color:red" onclick="deleteItem('${doc.id}')">[ลบ]</span>
                </td></tr>`;
        });
        document.getElementById('content-area').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = totalBuy;
    };

    window.saveData = async () => {
        await addDoc(collection(db, "portfolio"), {
            category: currentCategory,
            date: document.getElementById('date').value,
            txType: document.getElementById('type-select').value,
            name: document.getElementById('name').value,
            price: document.getElementById('price').value
        });
        closeModal();
        loadData();
    };

    window.deleteItem = async (id) => {
        if(confirm('ลบรายการนี้?')) {
            await deleteDoc(doc(db, "portfolio", id));
            loadData();
        }
    };

    window.editItem = (id, data) => {
        openModal(id, data);
    };

    window.updateData = async (id) => {
        await updateDoc(doc(db, "portfolio", id), {
            date: document.getElementById('date').value,
            txType: document.getElementById('type-select').value,
            name: document.getElementById('name').value,
            price: document.getElementById('price').value
        });
        closeModal();
        loadData();
    };

    window.openModal = (id = null, data = null) => {
        document.getElementById('modal-body').innerHTML = `
            <h2>${id ? 'แก้ไข' : 'เพิ่มรายการ'}</h2>
            <input type="date" id="date" value="${data ? data.date : new Date().toISOString().split('T')[0]}">
            <select id="type-select">
                <option value="buy" ${data && data.txType === 'buy' ? 'selected' : ''}>ซื้อ</option>
                <option value="sell" ${data && data.txType === 'sell' ? 'selected' : ''}>ขาย</option>
                <option value="dividend" ${data && data.txType === 'dividend' ? 'selected' : ''}>ปันผล</option>
            </select>
            <input type="text" id="name" placeholder="ชื่อสินทรัพย์" value="${data ? data.name : ''}">
            <input type="number" id="price" placeholder="จำนวนเงิน" value="${data ? data.price : ''}">
            <button class="nav-btn" style="width:100%; background:#007bff" onclick="${id ? `updateData('${id}')` : 'saveData()'}">บันทึก</button>
            <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="closeModal()">ปิด</button>`;
        document.getElementById('modal').style.display = 'block';
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';
    
    // เริ่มต้น
    setCategory('thai');
</script>
</body>
</html>
