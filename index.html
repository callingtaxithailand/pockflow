<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        h1 { font-size: 1.5rem; text-align: center; }
        nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .active { background: #007bff; border-color: #007bff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: left; }
        th { color: #888; font-size: 0.8rem; }
        .del-btn { color: #ff4444; cursor: pointer; font-weight: bold; }
        #add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background-color: #007bff; color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 100; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <nav>
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">หุ้นต่างประเทศ</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">เทรดทอง</button>
    </nav>

    <div id="thai" class="content-section"><h2>หุ้นไทย</h2><table><thead><tr><th>ชื่อ</th><th>จำนวน</th><th>เงิน</th><th></th></tr></thead><tbody id="tbody-thai"></tbody></table></div>
    <div id="foreign" class="content-section"><h2>หุ้นต่างประเทศ</h2><table><thead><tr><th>ชื่อ</th><th>จำนวน</th><th>เงิน</th><th></th></tr></thead><tbody id="tbody-foreign"></tbody></table></div>
    <div id="gold" class="content-section"><h2>เทรดทอง</h2><table><thead><tr><th>ชื่อ</th><th>จำนวน</th><th>เงิน</th><th></th></tr></thead><tbody id="tbody-gold"></tbody></table></div>
</div>

<button id="add-btn" onclick="toggleModal(true)">+</button>

<div id="modal">
    <h2 style="text-align:center;">เพิ่มรายการใหม่</h2>
    <div class="form-group"><label>ประเภท</label>
        <select id="type"><option value="thai">หุ้นไทย</option><option value="foreign">หุ้นต่างประเทศ</option><option value="gold">เทรดทอง</option></select>
    </div>
    <div class="form-group"><label>ชื่อหุ้น</label><input type="text" id="name" placeholder="PTT, SCB, VOO..."></div>
    <div class="form-group"><label>จำนวน</label><input type="number" id="qty"></div>
    <div class="form-group"><label>จำนวนเงิน</label><input type="number" id="price"></div>
    <button class="nav-btn" onclick="saveData()" style="width:100%; background:#007bff; margin-bottom:10px;">บันทึก</button>
    <button class="nav-btn" onclick="toggleModal(false)" style="width:100%; background:#444;">ยกเลิก</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('stocks')) || [];

    function renderTable() {
        ['thai', 'foreign', 'gold'].forEach(type => {
            const tbody = document.getElementById('tbody-' + type);
            tbody.innerHTML = '';
            data.filter(item => item.type === type).forEach((item, index) => {
                tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${item.price}</td><td class="del-btn" onclick="deleteItem('${item.id}')">✕</td></tr>`;
            });
        });
    }

    function saveData() {
        const newItem = {
            id: Date.now().toString(),
            type: document.getElementById('type').value,
            name: document.getElementById('name').value,
            qty: document.getElementById('qty').value,
            price: document.getElementById('price').value
        };
        data.push(newItem);
        localStorage.setItem('stocks', JSON.stringify(data));
        renderTable();
        toggleModal(false);
    }

    function deleteItem(id) {
        data = data.filter(item => item.id !== id);
        localStorage.setItem('stocks', JSON.stringify(data));
        renderTable();
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(document.getElementById('btn-' + id)) document.getElementById('btn-' + id).classList.add('active');
        localStorage.setItem('activePage', id);
    }

    function toggleModal(show) { document.getElementById('modal').style.display = show ? 'block' : 'none'; }

    window.onload = () => {
        showSection(localStorage.getItem('activePage') || 'thai');
        renderTable();
    };
</script>
</body>
</html>
