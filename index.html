<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow - Portfolio Manager</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        /* สไตล์ตารางรายงาน */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #1a1a1a; }
        /* สไตล์ปุ่ม */
        .btn-add { background: #ffb300; padding: 10px; border-radius: 8px; border: none; font-weight: bold; width: 100%; }
        /* ส่วนประกอบอื่นๆ */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <h2>Dashboard</h2>
        <div style="background: #1a1a1a; padding: 15px; border-radius: 10px;">
            <p>เงินปันผลสะสม: ฿0.00</p>
            <p>มูลค่าพอร์ต: ฿0.00</p>
        </div>
        <button class="btn-add" onclick="showPage('page-report')">ดูรายงานแยกประเภทหุ้น</button>
    </div>

    <div id="page-report" class="page">
        <h2>รายงานแยกประเภทหุ้น</h2>
        <select id="stockFilter" onchange="filterStock()">
            <option value="all">ทั้งหมด</option>
            <option value="TISCO">TISCO</option>
            <option value="SCB">SCB</option>
            <option value="VOO">VOO</option>
        </select>
        <table>
            <thead><tr><th>วันที่</th><th>ประเภท</th><th>หุ้น</th><th>จำนวนเงิน</th></tr></thead>
            <tbody id="reportTable"></tbody>
        </table>
        <button class="btn-add" style="margin-top:20px;" onclick="showPage('page-dashboard')">กลับหน้าหลัก</button>
    </div>

    <div class="nav-bar">
        <div onclick="showPage('page-dashboard')">📊 แดชบอร์ด</div>
        <div onclick="showPage('page-report')">📈 รายงานหุ้น</div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function filterStock() {
            // ฟังก์ชันสำหรับกรองข้อมูลตามหุ้นที่เลือก
            console.log("กรองข้อมูลตามหุ้น: " + document.getElementById('stockFilter').value);
        }
    </script>
</body>
</html>
