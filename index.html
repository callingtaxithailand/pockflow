<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment App</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 10px; 
        }
        .form-container { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }
        /* ทำให้ input เต็มความกว้างหน้าจอมือถือ */
        input, select, button { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0; 
            box-sizing: border-box; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px; 
        }
        button { background: #444; font-weight: bold; }
        
        .card { 
            border-left: 6px solid; /* เน้นขอบซ้ายให้ดูเหมือนแอป */
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            background: #1e1e1e; 
        }
        .buy { border-color: #4caf50; }
        .sell { border-color: #f44336; }
        .dividend { border-color: #2196f3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 style="margin-top:0">บันทึกรายการ</h2>
        <form id="transactionForm">
            <input type="date" id="date" required>
            <select id="type">
                <option value="buy">ซื้อ</option>
                <option value="sell">ขาย</option>
                <option value="dividend">ปันผล</option>
            </select>
            <input type="text" id="mainCat" placeholder="หมวดหมู่หลัก" required>
            <input type="text" id="subCat" placeholder="หมวดหมู่ย่อย" required>
            <input type="text" id="owner" placeholder="ซื้อให้ใคร" required>
            <input type="number" id="price" placeholder="ราคา" required>
            <button type="submit">บันทึกรายการ</button>
        </form>
    </div>

    <div id="displayArea"></div>

    <script type="module">
        // (ส่วนของ Firebase เหมือนเดิมที่เคยให้ไว้)
        // ... นำโค้ด import และ firebaseConfig มาวางตรงนี้ ...
    </script>
</body>
</html>
