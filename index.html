<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow - ประวัติธุรกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black mb-6">ประวัติธุรกรรม</h1>

        <!-- ส่วนค้นหาและกรองข้อมูล -->
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 space-y-3 mb-6">
            <input type="text" id="searchBar" placeholder="ค้นหารายการ..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="dateFilter" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
                <select id="categoryFilter" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
                    <option value="">ทุกหมวดหมู่</option>
                    <option value="EXPENSE">รายจ่ายในบ้าน</option>
                    <option value="STOCK">หุ้น & สินทรัพย์</option>
                </select>
            </div>
        </div>

        <!-- รายการธุรกรรม -->
        <div id="transactionContainer" class="space-y-6">
            <!-- ข้อมูลจะถูกโหลดที่นี่ด้วย JS -->
        </div>
    </div>

    <script>
        // ข้อมูลจำลอง (แทนที่ด้วยข้อมูลจากฐานข้อมูลของคุณ)
        const transactions = [
            { id: 1, date: '2026-06-15', title: 'แชร์ (ชมพู่)', category: 'EXPENSE', amount: 1000 },
            { id: 2, date: '2026-06-07', title: 'สาธารณูปโภค (COWAY)', category: 'EXPENSE', amount: 790 },
            { id: 3, date: '2026-06-04', title: 'NVDY (หุ้น)', category: 'STOCK', amount: 499.77 }
        ];

        function renderTransactions(data) {
            const container = document.getElementById('transactionContainer');
            container.innerHTML = '';
            
            // จัดกลุ่มข้อมูลตามวันที่
            const grouped = data.reduce((acc, curr) => {
                (acc[curr.date] = acc[curr.date] || []).push(curr);
                return acc;
            }, {});

            Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
                const dateHeader = new Date(date).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                
                let html = `<div class="space-y-2">
                    <h2 class="text-amber-400 font-bold text-sm uppercase">${dateHeader}</h2>`;
                
                grouped[date].forEach(t => {
                    html += `
                    <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${t.title}</p>
                            <p class="text-xs text-zinc-500">${t.category}</p>
                        </div>
                        <span class="font-black text-rose-400">฿${t.amount.toLocaleString()}</span>
                    </div>`;
                });
                
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        // ระบบค้นหา
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = transactions.filter(t => t.title.toLowerCase().includes(val));
            renderTransactions(filtered);
        });

        // เริ่มต้นแสดงผล
        renderTransactions(transactions);
    </script>
</body>
</html>
