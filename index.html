<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 8px; border: 2px solid #007bff; color: #00d4ff; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #333; padding: 12px 5px; text-align: left; }
        .btn-action { cursor: pointer; padding: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; padding: 20px; overflow-y: auto; z-index: 1000; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #555; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div class="summary-box">รวมยอดซื้อ: <span id="sum-buy">0</span></div>
    <div id="main-table"></div>
</div>

<button onclick="openForm()" style="position:fixed; bottom:20px; right:20px; width:55px; height:55px; border-radius:50%; border:none; background:#ff007f; color:white; font-size:24px;">+</button>

<div id="form-modal" class="modal">
    <h2 id="modal-title" style="color:#00d4ff;">จัดการรายการ</h2>
    <input type="hidden" id="edit-id">
    <input type="date" id="date">
    <select id="type">
        <option value="ซื้อ">ซื้อ</option>
        <option value="ขาย">ขาย</option>
        <option value="ปันผล">ปันผล</option>
    </select>
    <input type="text" id="name" placeholder="ชื่อหุ้น">
    <input type="number" id="price" placeholder="จำนวนเงิน">
    <button onclick="saveData()" style="width:100%; padding:15px; background:#007bff; border:none; color:white;">บันทึก</button>
    <button onclick="closeForm()" style="width:100%; padding:15px; margin-top:10px; background:#444; border:none; color:white;">ปิด</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function render() {
        let html = `<table><tr><th>วันที่</th><th>ชื่อหุ้น</th><th>ประเภท</th><th>เงิน</th><th>จัด</th></tr>`;
        let totalBuy = 0;
        
        data.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(i => {
            if(i.type === 'ซื้อ') totalBuy += Number(i.price);
            html += `<tr>
                <td>${i.date}</td>
                <td>${i.name}</td>
                <td>${i.type}</td>
                <td>${i.price}</td>
                <td>
                    <span class="btn-action" onclick="editItem('${i.id}')">✏️</span>
                    <span class="btn-action" onclick="deleteItem('${i.id}')">❌</span>
                </td>
            </tr>`;
        });
        
        document.getElementById('main-table').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = totalBuy;
        localStorage.setItem('myPortfolio', JSON.stringify(data));
    }

    function saveData() {
        const id = document.getElementById('edit-id').value;
        const newItem = {
            id: id || Date.now().toString(),
            date: document.getElementById('date').value,
            type: document.getElementById('type').value,
            name: document.getElementById('name').value,
            price: document.getElementById('price').value
        };

        if(id) {
            data = data.map(item => item.id === id ? newItem : item);
        } else {
            data.push(newItem);
        }
        
        closeForm();
        render();
    }

    function deleteItem(id) {
        if(confirm('ยืนยันการลบรายการนี้?')) {
            data = data.filter(item => item.id !== id);
            render();
        }
    }

    function editItem(id) {
        const item = data.find(i => i.id === id);
        if(!item) return;
        document.getElementById('edit-id').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('type').value = item.type;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        document.getElementById('form-modal').style.display = 'block';
    }

    function openForm() { document.getElementById('form-modal').style.display = 'block'; }
    function closeForm() { 
        document.getElementById('edit-id').value = ''; 
        document.getElementById('form-modal').style.display = 'none'; 
    }
    
    window.onload = render;
</script>
</body>
</html>
