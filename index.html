<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <div class="bg-indigo-600 p-6 text-white shadow-lg">
        <h1 class="text-sm opacity-80">ยอดเงินคงเหลือ</h1>
        <p id="totalBalance" class="text-4xl font-bold">฿ 0</p>
    </div>

    <div class="p-4 space-y-3">
        <div class="bg-white p-4 rounded-xl shadow border border-gray-200">
            <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-3 border rounded mb-2">
            
            <select id="mainCat" onchange="updateSubCats()" class="w-full p-3 border rounded mb-2">
                <option value="รายรับ">💰 รายรับ</option>
                <option value="อาหาร">🍜 อาหาร</option>
                <option value="เดินทาง">🚗 เดินทาง</option>
                <option value="หุ้น">📈 หุ้น</option>
            </select>

            <select id="subCat" class="w-full p-3 border rounded mb-2">
                </select>

            <div class="flex gap-2">
                <button onclick="addEntry('income')" class="flex-1 bg-green-500 text-white py-3 rounded font-bold">รับ (+)</button>
                <button onclick="addEntry('expense')" class="flex-1 bg-red-500 text-white py-3 rounded font-bold">จ่าย (-)</button>
            </div>
        </div>

        <div id="list" class="space-y-2"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-xl">
        <div class="text-center"><span class="block text-xl">🏠</span><span class="text-xs">หน้าแรก</span></div>
        <div class="text-center"><span class="block text-xl">📊</span><span class="text-xs">สรุป</span></div>
        <div class="text-center"><span class="block text-xl">⚙️</span><span class="text-xs">ตั้งค่า</span></div>
    </div>

    <script>
        const subCategories = {
            'รายรับ': ['เงินเดือน', 'งานเสริม', 'โบนัส'],
            'อาหาร': ['มื้อเช้า', 'มื้อเที่ยง', 'มื้อเย็น', 'ของว่าง'],
            'เดินทาง': ['วินมอไซค์', 'แท็กซี่', 'น้ำมัน/ทางด่วน'],
            'หุ้น': ['PTT', 'CPALL', 'DELTA', 'อื่นๆ']
        };

        function updateSubCats() {
            const main = document.getElementById('mainCat').value;
            const subSelect = document.getElementById('subCat');
            subSelect.innerHTML = '';
            subCategories[main].forEach(item => {
                subSelect.innerHTML += `<option value="${item}">${item}</option>`;
            });
        }

        let transactions = JSON.parse(localStorage.getItem('PF_Data')) || [];

        function addEntry(type) {
            const amount = parseFloat(document.getElementById('amount').value);
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subCat').value;
            
            if (!amount) return alert('กรุณากรอกจำนวนเงิน');
            
            transactions.push({ type, amount, main, sub });
            localStorage.setItem('PF_Data', JSON.stringify(transactions));
            document.getElementById('amount').value = '';
            updateUI();
        }

        function deleteEntry(index) {
            transactions.splice(index, 1);
            localStorage.setItem('PF_Data', JSON.stringify(transactions));
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            let total = 0;
            transactions.forEach((t, index) => {
                total += (t.type === 'income' ? t.amount : -t.amount);
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm border-l-4 ${t.type === 'income' ? 'border-green-500' : 'border-red-500'}">
                        <div>
                            <p class="font-bold">${t.main} (${t.sub})</p>
                            <p class="text-sm ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                                ${t.type === 'income' ? '+' : '-'} ฿${t.amount.toLocaleString()}
                            </p>
                        </div>
                        <button onclick="deleteEntry(${index})" class="text-gray-400">ลบ</button>
                    </div>
                `;
            });
            document.getElementById('totalBalance').innerText = '฿ ' + total.toLocaleString();
        }

        updateSubCats(); // เรียกตอนเริ่ม
        updateUI();
    </script>
</body>
</html>
