<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Pro</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; font-weight: 500; }
        h1, h2, h3, th { color: #00d4ff; font-weight: 800; }
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #007bff; }
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .active { background: #007bff; border-color: #007bff; font-weight: 800; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 10px 5px; text-align: left; }
        .action-btns { display: flex; gap: 10px; }
        .btn-edit { color: #ffc107; cursor: pointer; }
        .btn-del { color: #ff4444; cursor: pointer; }
        
        #add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background-color: #ff007f; border-radius: 50%; border: none; color: white; font-size: 35px; z-index: 100; cursor: pointer; box-shadow: 0 0 15px #ff007f; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 200; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 2px solid #555; color: #fff; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">ตปท</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">ทอง</button>
    </div>

    <div class="summary-box">
        <div style="color: #00d4ff;">รวมยอดซื้อ: <span id="sum-buy" style="color: #fff;">0</span></div>
        <div style="color: #00d4ff;">รวมปันผล: <span id="sum-div" style="color: #fff;">0</span></div>
    </div>

    <div id="content-area"></div>
</div>

<button id="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <h3 id="modal-title" style="color:#00d4ff;">เพิ่มธุรกรรม</h3>
    <input type="hidden" id="edit-id">
    <label>วันที่</label><input type="date" id="date">
    <label>ประเภท</label>
    <select id="type-select"><option value="buy">ซื้อ</option><option value="sell">ขาย</option><option value="dividend">ปันผล</option></select>
    <label>ชื่อหุ้น</label><input type="text" id="name">
    <label>จำนวนเงิน</label><input type="number" id="price">
    <button class="nav-btn" onclick="saveData()" style="width:100%; background:#007bff; font-weight:800;">บันทึกข้อมูล</button>
    <button class="nav-btn" onclick="closeModal()" style="width:100%; margin-top:10px; background:#444;">ยกเลิก</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function showSection(type) {
        localStorage.setItem('activePage', type);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        
        let filtered = data.filter(i => i.category === type);
        let html = `<table><tr><th>วันที่</th><th>ชื่อ</th><th>เงิน</th><th>จัดการ</th></tr>`;
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(i => {
            html += `<tr><td>${i.date}</td><td>${i.name}</td><td>${i.price}</td>
                     <td class="action-btns">
                        <span class="btn-edit" onclick="editItem('${i.id}')">✏️</span>
                        <span class="btn-del" onclick="deleteItem('${i.id}')">❌</span>
                     </td></tr>`;
        });
        document.getElementById('content-area').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = filtered.filter(i => i.txType === 'buy').reduce((s, i) => s + Number(i.price), 0);
        document.getElementById('sum-div').innerText = filtered.filter(i => i.txType === 'dividend').reduce((s, i) => s + Number(i.price), 0);
    }

    function saveData() {
        const id = document.getElementById('edit-id').value;
        const item = {
            id: id ? id : Date.now().toString(),
            category: localStorage.getItem('activePage') || 'thai',
            txType: document.getElementById('type-select').value,
            date: document.getElementById('date').value,
            name: document.getElementById('name').value,
            price: document.getElementById('price').value
        };
        
        if(id) {
            data = data.map(i => i.id === id ? item : i);
        } else {
            data.push(item);
        }
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal();
        showSection(item.category);
    }

    function editItem(id) {
        const item = data.find(i => i.id === id);
        document.getElementById('edit-id').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('type-select').value = item.txType;
        document.getElementById('name').value = item.name;
        document.getElementById('price').value = item.price;
        openModal('แก้ไขรายการ');
    }

    function deleteItem(id) {
        if(confirm('ยืนยันการลบ?')) {
            data = data.filter(i => i.id !== id);
            localStorage.setItem('myPortfolio', JSON.stringify(data));
            showSection(localStorage.getItem('activePage'));
        }
    }

    function openModal(title = 'เพิ่มธุรกรรม') { document.getElementById('modal-title').innerText = title; document.getElementById('modal').style.display = 'block'; }
    function closeModal() { document.getElementById('edit-id').value = ''; document.getElementById('modal').style.display = 'none'; }
    window.onload = () => showSection(localStorage.getItem('activePage') || 'thai');
</script>
</body>
</html>
