<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Tracker</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; font-weight: 600; }
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 10px; border: 2px solid #007bff; color: #00d4ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #333; padding: 10px; text-align: left; }
        .clickable { color: #00d4ff; text-decoration: underline; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #555; border-radius: 5px; }
        .btn-action { padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div class="summary-box">รวมยอดซื้อทั้งหมด: <span id="sum-buy">0</span></div>
    <div id="main-table"></div>
</div>

<button onclick="openAddModal()" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:60px; height:60px; border-radius:50%; border:none; background:#ff007f; color:white; font-size:30px;">+</button>

<div id="detail-modal" class="modal">
    <h2 id="modal-title" style="color:#00d4ff;"></h2>
    <div id="modal-body"></div>
    <button onclick="closeModal('detail-modal')" style="width:100%; padding:10px; margin-top:20px; background:#444; color:#fff; border:none;">ปิด</button>
</div>

<div id="form-modal" class="modal">
    <h2 id="form-title">เพิ่ม/แก้ไขรายการ</h2>
    <input type="hidden" id="edit-id">
    <input type="date" id="date">
    <select id="type">
        <option value="ซื้อ">ซื้อ</option>
        <option value="ขาย">ขาย</option>
        <option value="ปันผล">ปันผล</option>
    </select>
    <input type="text" id="name" placeholder="ชื่อหุ้น">
    <input type="number" id="price" placeholder="จำนวนเงิน">
    <button onclick="saveData()" style="width:100%; padding:10px; background:#007bff; border:none; color:white;">บันทึก</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function renderMain() {
        let groups = {};
        data.forEach(i => {
            if(!groups[i.name]) groups[i.name] = { buy:0, sell:0, div:0 };
            if(i.type === 'ซื้อ') groups[i.name].buy += Number(i.price);
            if(i.type === 'ขาย') groups[i.name].sell += Number(i.price);
            if(i.type === 'ปันผล') groups[i.name].div += Number(i.price);
        });

        let html = `<table><tr><th>ชื่อหุ้น</th><th>ซื้อ</th><th>ขาย</th><th>ปันผล</th></tr>`;
        for(let name in groups) {
            html += `<tr><td class="clickable" onclick="showDetail('${name}')">${name}</td><td>${groups[name].buy}</td><td>${groups[name].sell}</td><td>${groups[name].div}</td></tr>`;
        }
        document.getElementById('main-table').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = data.filter(i => i.type === 'ซื้อ').reduce((s, i) => s + Number(i.price), 0);
    }

    function showDetail(name) {
        let items = data.filter(i => i.name === name);
        let html = `<table><tr><th>วันที่</th><th>ประเภท</th><th>เงิน</th><th>จัดการ</th></tr>`;
        items.forEach(i => {
            html += `<tr><td>${i.date}</td><td>${i.type}</td><td>${i.price}</td>
                     <td><button onclick="editItem('${i.id}')">✏️</button> <button onclick="deleteItem('${i.id}')">❌</button></td></tr>`;
        });
        document.getElementById('modal-title').innerText = "หุ้น: " + name;
        document.getElementById('modal-body').innerHTML = html + `</table>`;
        document.getElementById('detail-modal').style.display = 'block';
    }

    // ฟังก์ชัน saveData, editItem, deleteItem และอื่นๆ ต่อจากนี้...
    // (โครงสร้างการทำงานเหมือนเดิมแต่เน้นแสดงแยกหน้าต่าง)
    
    window.onload = renderMain;
</script>
</body>
</html>
