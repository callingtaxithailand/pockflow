<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- ตั้งค่า Firebase ของคุณที่นี่ ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- บันทึกข้อมูล ---
        window.saveData = async () => {
            const market = document.getElementById('market').value || "ทั่วไป";
            const asset = document.getElementById('asset').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            const fee = parseFloat(document.getElementById('fee').value) || 0;
            const type = document.getElementById('type').value;

            if(!asset || !amount) return alert("กรุณากรอกข้อมูลให้ครบ");

            await addDoc(collection(db, "transactions"), {
                market, asset, amount, tax, fee, type, date: new Date().toISOString()
            });
            alert("บันทึกสำเร็จ!");
        };

        // --- สรุปผล ---
        onSnapshot(collection(db, "transactions"), (snapshot) => {
            let summary = { buy: 0, sell: 0, div: 0 };
            snapshot.forEach((doc) => {
                const d = doc.data();
                if (d.type === 'buy') summary.buy += d.amount;
                if (d.type === 'sell') summary.sell += d.amount;
                if (d.type === 'div') summary.div += d.amount;
            });

            const profit = (summary.sell + summary.div) - summary.buy;

            document.getElementById('reportBoard').innerHTML = `
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700 mt-6 space-y-2">
                    <h3 class="text-3xl font-bold text-white mb-4 border-b border-gray-700 pb-2">สรุปภาพรวม</h3>
                    <p class="text-2xl text-red-400">ยอดซื้อ: ${summary.buy.toLocaleString()}</p>
                    <p class="text-2xl text-blue-400">ยอดขาย: ${summary.sell.toLocaleString()}</p>
                    <p class="text-2xl text-green-400">เงินปันผล: ${summary.div.toLocaleString()}</p>
                    <div class="pt-4 mt-4 border-t border-gray-600">
                        <p class="text-4xl font-black text-white">กำไรสุทธิ: ${profit.toLocaleString()}</p>
                    </div>
                </div>
            `;
        });
    </script>
</head>
<body class="bg-black text-white p-4 min-h-screen">
    <h1 class="text-6xl font-black text-center text-blue-500 my-8">PocketFlow</h1>

    <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700 space-y-4">
        <input list="mList" id="market" placeholder="หมวดหมู่หลัก (เช่น หุ้นไทย)" class="w-full p-6 text-2xl bg-black border-2 border-gray-600 rounded-2xl">
        <datalist id="mList"><option value="หุ้นไทย"><option value="หุ้นสหรัฐ"></datalist>
        
        <input id="asset" type="text" placeholder="ชื่อสินทรัพย์ (TISCO, SCB)" class="w-full p-6 text-2xl bg-black border-2 border-gray-600 rounded-2xl">
        <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-6 text-2xl bg-black border-2 border-gray-600 rounded-2xl">
        
        <div class="grid grid-cols-2 gap-4">
            <input id="tax" type="number" placeholder="ภาษี" class="p-6 text-xl bg-black border-2 border-gray-600 rounded-2xl">
            <input id="fee" type="number" placeholder="ค่าธรรมเนียม" class="p-6 text-xl bg-black border-2 border-gray-600 rounded-2xl">
        </div>

        <select id="type" class="w-full p-6 text-2xl bg-black border-2 border-gray-600 rounded-2xl">
            <option value="buy">รายการ ซื้อ</option>
            <option value="sell">รายการ ขาย</option>
            <option value="div">เงินปันผล</option>
        </select>
        
        <button onclick="saveData()" class="w-full bg-blue-600 text-white py-6 rounded-2xl text-3xl font-bold">บันทึกข้อมูล</button>
    </div>

    <div id="reportBoard"></div>
</body>
</html>
