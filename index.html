<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มธุรกรรม - PocketFlow</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .input-group { display: flex; gap: 10px; }
        .add-btn { background: #333; border: none; color: #fff; padding: 0 15px; border-radius: 8px; cursor: pointer; }
        .submit-btn { width: 100%; background: #ffb300; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">เพิ่มธุรกรรม</h2>

    <form id="transactionForm">
        <div class="form-group">
            <label>วันที่</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>หมวดหมู่หลัก</label>
            <div class="input-group">
                <select id="mainCategory">
                    <option value="">เลือกหมวดหมู่หลัก</option>
                </select>
                <button type="button" class="add-btn" onclick="addOption('mainCategory')">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>หมวดหมู่ย่อย</label>
            <div class="input-group">
                <select id="subCategory">
                    <option value="">เลือกหมวดหมู่ย่อย</option>
                </select>
                <button type="button" class="add-btn" onclick="addOption('subCategory')">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>ซื้อให้ใคร</label>
            <input type="text" placeholder="ระบุชื่อผู้รับ">
        </div>

        <div class="form-group">
            <label>ราคา</label>
            <input type="number" placeholder="0.00">
        </div>

        <button type="submit" class="submit-btn">บันทึกธุรกรรม</button>
    </form>

    <script>
        function addOption(selectId) {
            const val = prompt("เพิ่มชื่อหมวดหมู่ใหม่:");
            if (val) {
                const select = document.getElementById(selectId);
                const option = document.createElement("option");
                option.text = val;
                option.value = val;
                select.add(option);
            }
        }

        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('บันทึกข้อมูลเรียบร้อย!');
        });
    </script>
</body>
</html>
