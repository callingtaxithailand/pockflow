<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PocketFlow - Active App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-24">

    <div class="bg-indigo-600 p-6 text-white text-center">
        <h2 class="text-sm opacity-80">ยอดเงินรวม</h2>
        <p id="totalBalance" class="text-4xl font-bold">฿ 0</p>
    </div>

    <div class="p-4 bg-white m-4 rounded-xl shadow">
        <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-2 border rounded mb-2">
        <select id="mainCat" class="w-full p-2 border rounded mb-2">
            <option>อาหาร</option><option>เดินทาง</option><option>เงินเดือน</option>
        </select>
        <input id="subCat" type="text" placeholder="หมวดหมู่ย่อย (เช่น มื้อเที่ยง)" class="w-full p-2 border rounded mb-2">
        <div class="flex gap-2">
            <button onclick="addEntry('income')" class="flex-1 bg-green-500 text-white p-2 rounded">รับ (+)</button>
            <button onclick="addEntry('expense')" class="flex-1 bg-red-500 text-white p-2 rounded">จ่าย (-)</button>
        </div>
    </div>

    <div id="list" class="p-4 space-y-2"></div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('pflow')) || [];

        function updateUI() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            let total = 0;
            transactions.forEach((t, index) => {
                total += (t.type === 'income' ? t.amount : -t.amount);
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-bold">${t.main} > ${t.sub}</p>
                            <p class="text-xs text-gray-500">${t.type === 'income' ? '+ ' : '- '} ฿${t.amount}</p>
                        </div>
                        <button onclick="deleteEntry(${index})" class="text-red-500 font-bold">ลบ</button>
                    </div>
                `;
            });
            document.getElementById('totalBalance').innerText = '฿ ' + total.toLocaleString();
            localStorage.setItem('pflow', JSON.stringify(transactions));
        }

        function addEntry(type) {
            const amount = parseFloat(document.getElementById('amount').value);
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subCat').value;
            if(amount) {
                transactions.push({type, amount, main, sub});
                updateUI();
            }
        }

        function deleteEntry(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
