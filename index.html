<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow Dashboard</title>
    <style>
        body { margin: 0; background-color: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo { width: 50px; height: 50px; background: linear-gradient(to bottom right, #ff9900, #ffcc00); border-radius: 12px; }
        
        .total-card { background: #1e1e1e; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .total-card h2 { margin: 0; font-size: 0.9rem; color: #aaa; }
        .total-amount { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { padding: 15px; border-radius: 15px; text-align: center; }
        .card h3 { margin: 0; font-size: 0.8rem; }
        .card p { font-size: 1.2rem; font-weight: bold; margin: 5px 0 0 0; }

        .income { background: #0a2616; color: #4caf50; border: 1px solid #1b5e20; }
        .expense { background: #260a0a; color: #f44336; border: 1px solid #b71c1c; }
        .dividend { background: #261f0a; color: #ffca28; border: 1px solid #f57f17; }
        .tax { background: #0a1f26; color: #29b6f6; border: 1px solid #01579b; }

        .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-btn { background: #ff9800; color: #000; padding: 10px 20px; border-radius: 10px; font-weight: bold; border: none; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; font-size: 0.7rem; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"></div>
        <div>
            <div style="font-weight: bold; font-size: 1.2rem;">PocketFlow</div>
            <div style="font-size: 0.8rem; color: #ff9800;">DIME EDITION</div>
        </div>
    </div>

    <div class="total-card">
        <h2>ยอดรวมกำไร/ขาดทุนพอร์ตสุทธิ</h2>
        <div class="total-amount">฿0.00</div>
    </div>

    <div class="grid">
        <div class="card income"><h3>รายรับทั้งหมด</h3><p>฿0</p></div>
        <div class="card expense"><h3>ค่าใช้จ่ายในบ้าน</h3><p>฿0</p></div>
        <div class="card dividend"><h3>เงินปันผลสะสม</h3><p>฿0</p></div>
        <div class="card tax"><h3>ภาษีที่โดนหักรวม</h3><p>฿0</p></div>
    </div>

    <div class="actions">
        <span>รายงานแยกตามรายชื่อหุ้น</span>
        <button class="add-btn">+ เพิ่มธุรกรรม</button>
    </div>

    <div>ประวัติรายการล่าสุด</div>

    <div class="nav-bar">
        <div class="nav-item">📊<br>แดชบอร์ด</div>
        <div class="nav-item">📈<br>รายงาน</div>
        <div class="nav-item">👤<br>โปรไฟล์</div>
        <div class="nav-item">📁<br>ธุรกรรม</div>
        <div class="nav-item">⚙️<br>ตั้งค่า</div>
    </div>

</body>
</html>
