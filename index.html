<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="app.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-5xl font-bold text-center my-6 text-blue-900">PocketFlow</h1>
    
    <!-- ส่วนสรุปยอด -->
    <div class="grid grid-cols-1 gap-4 mb-6">
        <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-green-500">
            <p class="text-xl text-gray-500">กำไรสะสม</p>
            <p id="totalProfit" class="text-6xl font-bold text-green-600">0.00</p>
        </div>
    </div>

    <!-- ฟอร์มบันทึก -->
    <div class="bg-white p-6 rounded-2xl shadow-lg">
        <input id="desc" type="text" placeholder="รายการ" class="w-full p-4 mb-2 border rounded-xl text-2xl">
        <input id="amount" type="number" placeholder="จำนวนเงิน" class="w-full p-4 mb-4 border rounded-xl text-2xl">
        <div class="grid grid-cols-3 gap-2">
            <button onclick="saveData('รายรับ')" class="bg-green-500 text-white py-4 rounded-xl text-xl font-bold">รับ</button>
            <button onclick="saveData('รายจ่าย')" class="bg-red-500 text-white py-4 rounded-xl text-xl font-bold">จ่าย</button>
            <button onclick="saveData('ปันผล')" class="bg-blue-500 text-white py-4 rounded-xl text-xl font-bold">ปันผล</button>
        </div>
    </div>
</body>
</html>
