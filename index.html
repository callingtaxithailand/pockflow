<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Manager</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
            authDomain: "pocketflow-49763.firebaseapp.com",
            projectId: "pocketflow-49763",
            storageBucket: "pocketflow-49763.firebasestorage.app",
            messagingSenderId: "213638502575",
            appId: "1:213638502575:web:6028d33bead869f0405c5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let activePage = localStorage.getItem('activePage') || 'thai';
        let data = [];

        async function loadData() {
            const q = query(collection(db, "portfolio"), where("category", "==", activePage));
            const querySnapshot = await getDocs(q);
            data = [];
            querySnapshot.forEach((doc) => {
                data.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
        }

        window.renderTable = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + activePage);
            if(btn) btn.classList.add('active');
            
            let html = `<table><tr><th>วันที่</th><th>ชื่อ</th><th>เงิน</th><th>จัดการ</th></tr>`;
            data.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(i => {
                html += `<tr>
                    <td>${i.date}</td>
                    <td class="clickable" onclick="window.openDetail('${i.name}')">${i.name}</td>
                    <td>${i.price}</td>
                    <td>
                        <span class="clickable" onclick="window.editItem('${i.id}')" style="color:#00ff00; margin-right:8px;">[แก้]</span>
                        <span class="clickable" onclick="window.deleteItem('${i.id}')" style="color:red;">[ลบ]</span>
                    </td>
                </tr>`;
            });
            document.getElementById('content-area').innerHTML = html + `</table>`;
            const sum = data.filter(i => i.txType === 'buy').reduce((s, i) => s + Number(i.price), 0);
            document.getElementById('sum-buy').innerText = sum;
        };

        window.showSection = (type) => {
            activePage = type;
            localStorage.setItem('activePage', type);
            loadData();
        };

        window.saveData = async () => {
            const item = { 
                category: activePage, 
                txType: document.getElementById('type-select').value, 
                date: document.getElementById('date').value, 
                name: document.getElementById('name').value, 
                price: document.getElementById('price').value 
            };
            await addDoc(collection(db, "portfolio"), item);
            closeModal();
            loadData();
        };

        window.deleteItem = async (id) => {
            if(confirm('ยืนยันการลบรายการนี้?')) {
                await deleteDoc(doc(db, "portfolio", id));
                loadData();
            }
        };

        window.editItem = (id) => {
            const item = data.find(i => i.id === id);
            openModal(item);
        };

        window.updateData = async (id) => {
            await updateDoc(doc(db, "portfolio", id), {
                txType: document.getElementById('type-select').value,
                date: document.getElementById('date').value,
                name: document.getElementById('name').value,
                price: document.getElementById('price').value
            });
            closeModal();
            loadData();
        };

        window.openModal = (item = null) => {
            const isEdit = !!item;
            document.getElementById('modal-body').innerHTML = `<h3>${isEdit ? 'แก้ไขรายการ' : 'เพิ่มธุรกรรม'}</h3>
                <input type="date" id="date" value="${isEdit ? item.date : ''}">
                <select id="type-select">
                    <option value="buy" ${isEdit && item.txType === 'buy' ? 'selected' : ''}>ซื้อ</option>
                    <option value="sell" ${isEdit && item.txType === 'sell' ? 'selected' : ''}>ขาย</option>
                    <option value="dividend" ${isEdit && item.txType === 'dividend' ? 'selected' : ''}>ปันผล</option>
                </select>
                <input type="text" id="name" placeholder="ชื่อหุ้น" value="${isEdit ? item.name : ''}">
                <input type="number" id="price" placeholder="จำนวนเงิน" value="${isEdit ? item.price : ''}">
                <button class="nav-btn" onclick="${isEdit ? `window.updateData('${item.id}')` : 'window.saveData()'}" style="width:100%; background:#007bff; font-weight:800;">${isEdit ? 'บันทึกการแก้ไข' : 'บันทึก'}</button>`;
            document.getElementById('modal').style.display = 'block';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';
        window.openDetail = (name) => { alert("ข้อมูลหุ้น: " + name); };
        window.onload = loadData;
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; font-weight: 500; }
        h1, th { color: #00d4ff; font-weight: 800; }
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #007bff; }
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .active { background: #007bff; border-color: #007bff; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 10px 5px; text-align: left; }
        .clickable { color: #00d4ff; text-decoration: underline; cursor: pointer; font-weight: 700; }
        #add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background-color: #ff007f; border-radius: 50%; border: none; color: white; font-size: 35px; z-index: 100; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 20px; box-sizing: border-box; z-index: 200; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 2px solid #555; color: #fff; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>พอร์ตการลงทุน</h1>
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button class="nav-btn" id="btn-thai" onclick="window.showSection('thai')">หุ้นไทย</button>
            <button class="nav-btn" id="btn-foreign" onclick="window.showSection('foreign')">ตปท</button>
            <button class="nav-btn" id="btn-gold" onclick="window.showSection('gold')">ทอง</button>
        </div>
        <div class="summary-box">ยอดซื้อรวม: <span id="sum-buy">0</span></div>
        <div id="content-area"></div>
    </div>
    <button id="add-btn" onclick="window.openModal()">+</button>
    <div id="modal" class="modal">
        <div id="modal-body"></div>
        <button class="nav-btn" onclick="window.closeModal()" style="width:100%; margin-top:20px; background:#444;">ปิด</button>
    </div>
</body>
</html>
