<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // ใส่ Config ของคุณที่นี่
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.saveData = async () => {
            const data = {
                date: document.getElementById('date').value,
                mMain: document.getElementById('mMain').value,
                mSub: document.getElementById('mSub').value,
                owner: document.getElementById('owner').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value
            };
            if(!data.date || !data.amount) return alert("กรอกข้อมูลให้ครบ");
            await addDoc(collection(db, "data"), data);
            alert("บันทึกสำเร็จ");
        };

        window.del = async (id) => { await deleteDoc(doc(db, "data", id)); };

        onSnapshot(query(collection(db, "data"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('report');
            list.innerHTML = '';
            snap.forEach(d => {
                const v = d.data();
                const color = v.type === 'ซื้อ' ? 'bg-green-900' : v.type === 'ขาย' ? 'bg-red-900' : 'bg-blue-900';
                list.innerHTML += `<div class="${color} p-4 mb-2 rounded-xl flex justify-between">
                    <div><b>${v.mSub}</b> (${v.type})<br>${v.date} | ซื้อให้: ${v.owner}<br>ยอด: ${v.amount.toFixed(2)}</div>
                    <button onclick="del('${d.id}')" class="text-white font-bold">ลบ</button>
                </div>`;
            });
        });
    </script>
</head>
<body class="bg-black text-white p-4">
    <h1 class="text-4xl font-bold text-center mb-6">PocketFlow</h1>
    
    <div class="space-y-4">
        <input id="date" type="date" class="w-full p-4 bg-gray-900 rounded-xl">
        <input id="mMain" type="text" placeholder="หมวดหมู่หลัก" class="w-full p-4 bg-gray-900 rounded-xl">
        <input id="mSub" type="text" placeholder="หมวดหมู่ย่อย (เช่น TISCO)" class="w-full p-4 bg-gray-900 rounded-xl">
        <input id="owner" type="text" placeholder="ซื้อให้ใคร" class="w-full p-4 bg-gray-900 rounded-xl">
        <input id="amount" type="number" step="0.01" placeholder="จำนวนเงิน" class="w-full p-4 bg-gray-900 rounded-xl">
        
        <select id="type" class="w-full p-4 bg-gray-900 rounded-xl font-bold">
            <option value="ซื้อ" class="text-green-500">ซื้อ (เขียว)</option>
            <option value="ขาย" class="text-red-500">ขาย (แดง)</option>
            <option value="ปันผล" class="text-blue-500">ปันผล (น้ำเงิน)</option>
        </select>

        <button onclick="saveData()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xl">บันทึกข้อมูล</button>
    </div>

    <h2 class="text-2xl mt-8 mb-4">รายงานสรุป</h2>
    <div id="report"></div>
</body>
</html>
