<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 600px; margin: auto; }
        h1 { font-size: 1.5rem; text-align: center; }
        
        /* ปรับปุ่มให้กดง่ายขึ้นบนมือถือ */
        nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { 
            flex: 1; padding: 12px; background: #222; color: #fff; 
            border: 1px solid #444; border-radius: 8px; cursor: pointer;
            font-size: 0.9rem;
        }
        .active { background: #007bff; border-color: #007bff; }
        
        /* ปรับตารางให้ขยายเต็มความกว้าง */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: left; }
        th { color: #888; font-size: 0.8rem; }
        
        .content-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <nav>
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">หุ้นต่างประเทศ</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">เทรดทอง</button>
    </nav>

    <div id="thai" class="content-section">
        <h2>หุ้นไทย</h2>
        <table>
            <tr><th>ชื่อหุ้น</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>PTT</td><td>100</td><td>3,500</td></tr>
        </table>
    </div>

    <div id="foreign" class="content-section">
        <h2>หุ้นต่างประเทศ</h2>
        <table>
            <tr><th>ชื่อหุ้น</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>AAPL</td><td>10</td><td>7,000</td></tr>
        </table>
    </div>

    <div id="gold" class="content-section">
        <h2>เทรดทอง</h2>
        <table>
            <tr><th>ชื่อรายการ</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>Gold Spot</td><td>1</td><td>65,000</td></tr>
        </table>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).style.display = 'block';
        document.getElementById('btn-' + id).classList.add('active');
        
        localStorage.setItem('activePage', id);
    }

    window.onload = () => {
        const savedPage = localStorage.getItem('activePage') || 'thai';
        showSection(savedPage);
    };
</script>

</body>
</html>
