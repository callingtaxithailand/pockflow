<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; }
        
        /* Header */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo { width: 55px; height: 55px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; }
        .brand h1 { margin: 0; font-size: 1.5rem; }
        .brand p { margin: 0; color: #ffb300; font-weight: bold; letter-spacing: 1px; }

        /* Main Amount Card */
        .main-card { background: #1a1a1a; padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 15px; }
        .main-card p { margin: 0; color: #a0a0a0; font-size: 0.9rem; }
        .main-amount { font-size: 3rem; font-weight: bold; margin-top: 10px; }

        /* Grid Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { padding: 15px; border-radius: 12px; text-align: center; }
        .card h3 { margin: 0; font-size: 0.85rem; }
        .card p { font-size: 1.4rem; font-weight: bold; margin: 8px 0 0 0; }

        .c1 { background: #0a1f12; color: #2e7d32; }
        .c2 { background: #1f0a0a; color: #c62828; }
        .c3 { background: #1f180a; color: #f9a825; }
        .c4 { background: #0a1a1f; color: #0277bd; }

        /* Actions */
        .row-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-btn { background: #ffb300; color: #000; padding: 12px 20px; border-radius: 10px; font-weight: bold; border: none; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { text-align: center; font-size: 0.75rem; color: #fff; }
        .nav-item.active { color: #ffb300; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"></div>
        <div class="brand">
            <h1>PocketFlow</h1>
            <p>DIME EDITION</p>
        </div>
    </div>

    <div class="main-card">
        <p>ยอดรวมกำไร/ขาดทุนพอร์ตสุทธิ</p>
        <div class="main-amount">฿0.00</div>
    </div>

    <div class="grid">
        <div class="card c1"><h3>รายรับทั้งหมด</h3><p>฿0</p></div>
        <div class="card c2"><h3>ค่าใช้จ่ายในบ้าน</h3><p>฿0</p></div>
        <div class="card c3"><h3>เงินปันผลสะสม</h3><p>฿0</p></div>
        <div class="card c4"><h3>ภาษีที่โดนหักรวม</h3><p>฿0</p></div>
    </div>

    <div class="row-action">
        <span style="color: #aaa;">รายงานแยกตามรายชื่อหุ้น</span>
        <button class="add-btn">+ เพิ่มธุรกรรม</button>
    </div>

    <div style="color: #aaa;">ประวัติรายการล่าสุด</div>

    <div class="nav-bar">
        <div class="nav-item active">📊<br>แดชบอร์ด</div>
        <div class="nav-item">📈<br>รายงาน</div>
        <div class="nav-item">👤<br>โปรไฟล์</div>
        <div class="nav-item">📁<br>ธุรกรรม</div>
        <div class="nav-item">⚙️<br>ตั้งค่า</div>
    </div>

</body>
</html>
