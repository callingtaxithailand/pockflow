<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow DIME EDITION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    body { font-size: 132%; } /* ขยายตัวอักษร 15% ตามคำขอ */
  </style>
</head>
<body class="bg-black text-white p-4 pb-24">

  <div class="max-w-md mx-auto space-y-6">
    <div class="bg-zinc-900 p-5 rounded-3xl space-y-4">
      <h2 class="text-2xl font-bold">เพิ่มหมวดหมู่ (เลือกรูปจากมือถือ)</h2>
      
      <input type="text" id="cat-name" placeholder="ชื่อหมวดหมู่" class="w-full bg-zinc-800 p-3 rounded-xl">
      
      <div class="flex items-center space-x-4">
        <input type="file" id="cat-image-input" accept="image/*" class="hidden">
        <label for="cat-image-input" class="bg-zinc-700 p-3 rounded-xl cursor-pointer">เลือกรูปภาพจากเครื่อง</label>
        <img id="image-preview" class="w-16 h-16 rounded-xl object-cover hidden">
      </div>

      <button id="save-cat" class="w-full bg-amber-500 text-black font-bold p-3 rounded-xl">บันทึกหมวดหมู่</button>
    </div>

    <div id="category-list" class="space-y-3"></div>
  </div>

  <script>
    // เก็บหมวดหมู่ (ใช้ Object เก็บรูปเป็น base64)
    let categories = JSON.parse(localStorage.getItem('my_categories')) || [];

    const imageInput = document.getElementById('cat-image-input');
    const imagePreview = document.getElementById('image-preview');
    let base64Image = "";

    // เมื่อเลือกรูปภาพ
    imageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          base64Image = event.target.result;
          imagePreview.src = base64Image;
          imagePreview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    // บันทึกหมวดหมู่
    document.getElementById('save-cat').addEventListener('click', () => {
      const name = document.getElementById('cat-name').value;
      if (!name || !base64Image) return alert("กรุณาใส่ชื่อและเลือกรูปภาพครับ");

      categories.push({ name, image: base64Image });
      localStorage.setItem('my_categories', JSON.stringify(categories));
      renderCategories();
    });

    function renderCategories() {
      const list = document.getElementById('category-list');
      list.innerHTML = categories.map((cat, index) => `
        <div class="bg-zinc-800 p-4 rounded-2xl flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <img src="${cat.image}" class="w-12 h-12 rounded-lg object-cover">
            <span class="font-bold">${cat.name}</span>
          </div>
          <button onclick="deleteCat(${index})" class="text-red-400">ลบ</button>
        </div>
      `).join('');
    }

    function deleteCat(index) {
      categories.splice(index, 1);
      localStorage.setItem('my_categories', JSON.stringify(categories));
      renderCategories();
    }

    renderCategories();
  </script>
</body>
</html>
