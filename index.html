<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow - Dime Stock Tracker</title>
  <!-- ใช้ Tailwind CSS สำหรับการจัดหน้าและดีไซน์ -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<!-- ปรับพื้นหลังเป็นสีดำสนิท (bg-black) -->
<body class="bg-black text-slate-100 font-sans antialiased">

  <!-- กล่องครอบขนาดหน้าจอมือถือ/คอมพิวเตอร์ -->
  <div class="max-w-md mx-auto min-h-screen flex flex-col p-5 bg-zinc-950 border-x border-zinc-900 shadow-2xl">
    
    <!-- Header: ชื่อแอป PocketFlow (ขยายขนาดขึ้น 10%) -->
    <header class="flex justify-between items-center py-5 border-b border-zinc-900">
      <h1 class="text-4xl font-black tracking-tight text-indigo-400">PocketFlow</h1>
      <span class="bg-indigo-950 text-indigo-300 text-sm font-bold px-4 py-1.5 rounded-full border border-indigo-900">Dime Portfolio</span>
    </header>

    <!-- Dashboard แสดงผลภาพรวม - ปรับพื้นหลังเข้ม และขยายตัวเลขใหญ่พิเศษขึ้น 10% -->
    <section class="my-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl">
      <p class="text-sm uppercase tracking-wider text-zinc-400 font-semibold">มูลค่าพอร์ตโดยรวม</p>
      <!-- ขยายขนาดตัวเลขยอดรวมหลัก -->
      <h2 class="text-5xl font-black mt-2 mb-5 tracking-tight text-white">$1,245.80</h2>
      
      <div class="grid grid-cols-2 gap-4 pt-5 border-t border-zinc-800">
        <div>
          <p class="text-sm text-zinc-400 font-medium">กำไร / ขาดทุนรวม</p>
          <!-- ตัวเลขกำไรสีเขียวสว่าง เด่นชัด ขยายใหญ่ขึ้น -->
          <p class="text-3xl font-extrabold text-emerald-400 mt-1">+$120.40</p>
        </div>
        <div>
          <p class="text-sm text-zinc-400 font-medium">เงินปันผลรวม</p>
          <!-- ตัวเลขปันผลสีส้มทอง ขยายใหญ่ขึ้น -->
          <p class="text-3xl font-extrabold text-amber-400 mt-1">$35.20</p>
        </div>
      </div>
    </section>

    <!-- ส่วนฟอร์มบันทึกรายการ (Quick Record) - ตัวหนังสือใหญ่ขึ้น พิมพ์ง่าย -->
    <section class="mb-6 bg-zinc-900/50 border border-zinc-800/80 rounded-2xl p-5">
      <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-500 mb-4">บันทึกรายการใหม่</h3>
      
      <!-- ปุ่มเลือกประเภทรายการ ตัวอักษรใหญ่ หนา ชัดเจน -->
      <div class="grid grid-cols-3 gap-2.5 mb-4">
        <button class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl text-center text-lg shadow-lg transition-all active:scale-95">ซื้อ (BUY)</button>
        <button class="bg-rose-600 hover:bg-rose-500 text-white font-black py-3 rounded-xl text-center text-lg shadow-lg transition-all active:scale-95">ขาย (SELL)</button>
        <button class="bg-amber-500 hover:bg-amber-400 text-neutral-950 font-black py-3 rounded-xl text-center text-lg shadow-lg transition-all active:scale-95">ปันผล (DIV)</button>
      </div>
      
      <!-- ช่องกรอกข้อมูล ขยายขนาดตัวอักษรพิมพ์ใหญ่ขึ้น 10% -->
      <div class="space-y-3.5">
        <div>
          <label class="text-xs text-zinc-400 mb-1 block">ชื่อหุ้น</label>
          <input type="text" placeholder="เช่น AAPL, TSLA" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-xl font-black uppercase text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-zinc-600">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-zinc-400 mb-1 block">จำนวนหุ้น</label>
            <input type="number" placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-xl font-bold text-white placeholder-zinc-600">
          </div>
          <div>
            <label class="text-xs text-zinc-400 mb-1 block">ราคาต่อหุ้น</label>
            <input type="number" placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-xl font-bold text-white placeholder-zinc-600">
          </div>
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-xl font-black py-4 rounded-xl transition-all shadow-lg shadow-indigo-600/20 active:scale-98 mt-2">
          บันทึกรายการลงพอร์ต
        </button>
      </div>
    </section>

    <!-- ส่วนแสดงประวัติรายการล่าสุด (Recent Transactions) -->
    <section class="flex-1">
      <h3 class="text-xl font-extrabold text-zinc-300 mb-4">ประวัติรายการในระบบ</h3>
      <div class="space-y-3">
        
        <!-- ตัวอย่าง: รายการซื้อหุ้น -->
        <div class="flex justify-between items-center p-4 bg-zinc-900 border border-zinc-850 rounded-xl shadow-md">
          <div class="flex items-center space-x-4">
            <div class="bg-emerald-950 text-emerald-400 border border-emerald-900 px-2.5 py-1.5 rounded-lg font-black text-sm tracking-wider">BUY</div>
            <div>
              <p class="text-xl font-black text-white leading-tight">AAPL</p>
              <p class="text-sm text-zinc-500 mt-0.5">19 มิ.ย. 2026 • 2.5 หุ้น</p>
            </div>
          </div>
          <p class="text-2xl font-black text-zinc-200">-$450.00</p>
        </div>

        <!-- ตัวอย่าง: รายการรับปันผล -->
        <div class="flex justify-between items-center p-4 bg-zinc-900 border border-zinc-850 rounded-xl shadow-md">
          <div class="flex items-center space-x-4">
            <div class="bg-amber-950 text-amber-400 border border-amber-900 px-2.5 py-1.5 rounded-lg font-black text-sm tracking-wider">DIV</div>
            <div>
              <p class="text-xl font-black text-white leading-tight">O</p>
              <p class="text-sm text-zinc-500 mt-0.5">15 มิ.ย. 2026 • ปันผล</p>
            </div>
          </div>
          <p class="text-2xl font-black text-emerald-400">+$15.20</p>
        </div>

      </div>
    </section>

    <!-- โค้ดเชื่อมต่อกับ Firebase (พร้อมใช้งานสำหรับขั้นตอนถัดไป) -->
    <script type="module">
      // คอนฟิกูเรชัน Firebase ของแอป PocketFlow ของคุณ
      const firebaseConfig = {
        apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
        authDomain: "pocketflow-49763.firebaseapp.com",
        projectId: "pocketflow-49763",
        storageBucket: "pocketflow-49763.firebasestorage.app",
        messagingSenderId: "213638502575",
        appId: "1:213638502575:web:6028d33bead869f0405c5a"
      };

      // หมายเหตุ: โค้ดการกดปุ่มบันทึกเพื่อส่งค่าไปที่ Cloud Firestore จะถูกเขียนเชื่อมโยงเพิ่มที่นี่ในขั้นตอนต่อไปครับ
    </script>

  </div>
</body>
</html>
