<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxiem - Trading Tracker Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-papers/1.0.0/fonts.css">
  <style>
    /* ปรับแต่งสไตล์สวิตช์เปิด-ปิดและฟิลด์ให้ดูนุ่มนวลแบบ Native App */
    .slide-down {
      transition: all 0.3s ease-out;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
    }
    .slide-down.open {
      max-height: 800px;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-gray-100 text-slate-800 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative pb-24">
    
    <main class="flex-1 p-5">
      
      <div class="flex justify-center items-center space-x-2 py-4 mb-2">
        <div class="w-9 h-9 bg-amber-400 rounded-full flex items-center justify-center text-xl">🧑‍🚀</div>
        <h1 class="text-2xl font-black tracking-tight text-[#1a1438]">Galaxiem</h1>
      </div>

      <section id="view-dashboard" class="space-y-5">
        <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 text-center py-8">
          <p class="text-sm font-medium text-gray-500 mb-1">ยอดรวมกำไร/ขาดทุนทั้งหมด</p>
          <h2 id="total-pnl-display" class="text-4xl font-black text-slate-900">฿0.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
            <p class="text-xs text-gray-400 font-bold">เงินปันผลสะสม</p>
            <p id="total-div-display" class="text-lg font-black text-amber-500 mt-1">฿0.00</p>
          </div>
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
            <p class="text-xs text-gray-400 font-bold">ค่าใช้จ่ายในบ้านรวม</p>
            <p id="total-exp-display" class="text-lg font-black text-rose-500 mt-1">฿0.00</p>
          </div>
        </div>

        <div class="pt-2">
          <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold text-gray-500 tracking-wide uppercase">รายงานแยกตามรายชื่อหุ้น</h3>
            <button onclick="showAddTradeForm()" class="bg-[#f08a24] text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm hover:bg-[#d6751c] transition-all">＋ เพิ่มธุรกรรม</button>
          </div>
          <div id="stock-report-list" class="space-y-2.5">
            </div>
        </div>
      </section>

      <section id="view-add-trade" class="hidden space-y-5">
        <div class="flex items-center space-x-3 mb-2">
          <button onclick="hideAddTradeForm()" class="text-gray-500 text-xl font-bold p-1">←</button>
          <h2 class="text-xl font-black text-slate-900">Add Trade</h2>
        </div>

        <div class="space-y-4">
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-1.5">Data Type</label>
            <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-xl">
              <button type="button" onclick="switchDataType('STOCK')" id="dtype-STOCK" class="py-2 rounded-lg font-bold text-xs bg-white text-slate-900 shadow-sm transition-all">📈 หุ้น / สินทรัพย์</button>
              <button type="button" onclick="switchDataType('EXPENSE')" id="dtype-EXPENSE" class="py-2 rounded-lg font-bold text-xs text-gray-500 transition-all">💸 ค่าใช้จ่ายในบ้าน</button>
            </div>
          </div>

          <div id="box-symbol">
            <label class="text-xs font-bold text-gray-700 block mb-1">Symbol</label>
            <input type="text" id="trade-symbol" placeholder="เช่น AAPL, BTC, TISCO" class="w-full bg-white border border-gray-200 rounded-xl p-3 text-base font-bold text-slate-900 focus:outline-none focus:border-gray-400">
          </div>

          <div id="box-categories" class="hidden space-y-3">
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="text-xs font-bold text-gray-700 block mb-1">หมวดหมู่หลัก</label>
                <select id="exp-main-cat" class="w-full bg-white border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-900 focus:outline-none"></select>
              </div>
              <div>
                <label class="text-xs font-bold text-gray-700 block mb-1">หมวดหมู่ย่อย</label>
                <select id="exp-sub-cat" class="w-full bg-white border border-gray-200 rounded-xl p-3 text-sm font-bold text-slate-900 focus:outline-none"></select>
              </div>
            </div>
          </div>

          <div id="box-trade-type">
            <label class="text-xs font-bold text-gray-700 block mb-1">Trade Type</label>
            <div class="grid grid-cols-3 gap-2">
              <button type="button" onclick="setTradeType('BUY')" id="ttype-BUY" class="py-2.5 rounded-xl font-bold text-sm bg-[#0f975d] text-white shadow-sm transition-all">BUY</button>
              <button type="button" onclick="setTradeType('SELL')" id="ttype-SELL" class="py-2.5 rounded-xl font-bold text-sm bg-white border border-gray-200 text-gray-400 transition-all">SELL</button>
              <button type="button" onclick="setTradeType('DIVIDEND')" id="ttype-DIVIDEND" class="py-2.5 rounded-xl font-bold text-sm bg-white border border-gray-200 text-gray-400 transition-all">ปันผล</button>
            </div>
          </div>

          <div>
            <label id="lbl-main-amount" class="text-xs font-bold text-gray-700 block mb-1">Profit/Loss</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-lg font-bold text-[#f08a24]">฿</span>
              <input type="number" step="any" id="trade-amount" placeholder="0.00" class="w-full bg-white border border-gray-200 rounded-xl p-3 pl-8 text-lg font-black text-slate-900 focus:outline-none focus:border-gray-400">
            </div>
          </div>

          <div>
            <label class="text-xs font-bold text-gray-700 block mb-1">Entry Date</label>
            <input type="date" id="trade-date" class="w-full bg-white border border-gray-200 rounded-xl p-3 text-base font-bold text-slate-900 focus:outline-none">
          </div>

          <div id="box-optional-wrapper" class="border border-gray-200 rounded-xl overflow-hidden bg-gray-50/50">
            <button type="button" onclick="toggleOptionalFields()" class="w-full p-3.5 flex justify-between items-center text-xs font-bold text-slate-800 bg-white border-b border-gray-100">
              <div class="flex items-center space-x-2">
                <span class="text-blue-500 text-sm">ℹ️</span>
                <span>Additional Information (Optional)</span>
              </div>
              <span id="optional-arrow" class="text-gray-400 text-xs transition-transform duration-200">▼</span>
            </button>
            
            <div id="optional-fields" class="slide-down p-4 space-y-3.5 bg-white">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-xs font-medium text-gray-600 block mb-1">Entry Price</label>
                  <input type="number" step="any" id="opt-entry-price" placeholder="0.00" class="w-full bg-white border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none">
                </div>
                <div>
                  <label class="text-xs font-medium text-gray-600 block mb-1">Exit Price</label>
                  <input type="number" step="any" id="opt-exit-price" placeholder="0.00" class="w-full bg-white border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none">
                </div>
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600 block mb-1">Lot Size / Volume</label>
                <input type="number" step="any" id="opt-lot-size" placeholder="เช่น 100, 0.5" class="w-full bg-white border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none">
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600 block mb-1">Exit Date</label>
                <input type="date" id="opt-exit-date" class="w-full bg-white border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none">
              </div>
              <div>
                <label class="text-xs font-medium text-gray-600 block mb-1">Notes</label>
                <textarea id="opt-notes" rows="3" placeholder="ระบุหมายเหตุบันทึกช่วยจำ..." class="w-full bg-white border border-gray-200 rounded-lg p-2.5 text-sm focus:outline-none"></textarea>
              </div>
            </div>
          </div>

          <div class="pt-2 space-y-2">
            <button type="button" id="btn-save-trade" class="w-full bg-[#f08a24] text-white text-base font-bold py-3.5 rounded-xl transition-all shadow-md hover:bg-[#d6751c]">Add Trade</button>
            <button type="button" onclick="hideAddTradeForm()" class="w-full bg-white border border-gray-200 text-gray-500 text-base font-bold py-3.5 rounded-xl hover:bg-gray-50 transition-all">Cancel</button>
          </div>
        </div>
      </section>

    </main>

    <nav class="absolute bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 flex justify-around items-center px-2 z-50">
      <button onclick="changeMenuTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center space-y-1 text-[#f08a24]">
        <span class="text-xl">📊</span>
        <span class="text-[10px] font-bold tracking-wide">Dashboard</span>
      </button>
      <button onclick="changeMenuTab('calendar')" id="nav-calendar" class="flex flex-col items-center space-y-1 text-gray-400">
        <span class="text-xl">📅</span>
        <span class="text-[10px] font-bold tracking-wide">Calendar</span>
      </button>
      <button onclick="changeMenuTab('trades')" id="nav-trades" class="flex flex-col items-center space-y-1 text-gray-400">
        <span class="text-xl">📋</span>
        <span class="text-[10px] font-bold tracking-wide">Trades</span>
      </button>
      <button onclick="changeMenuTab('settings')" id="nav-settings" class="flex flex-col items-center space-y-1 text-gray-400">
        <span class="text-xl">⚙️</span>
        <span class="text-[10px] font-bold tracking-wide">Settings</span>
      </button>
    </nav>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
      authDomain: "pocketflow-49763.firebaseapp.com",
      projectId: "pocketflow-49763",
      storageBucket: "pocketflow-49763.firebasestorage.app",
      messagingSenderId: "213638502575",
      appId: "1:213638502575:web:6028d33bead869f0405c5a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDataType = 'STOCK';
    let currentTradeType = 'BUY';
    let allTransactions = [];

    document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];

    // ข้อมูลหมวดหมู่ตั้งต้น
    const customCategories = {
      "🔧 ซ่อมบำรุง": ["รถยนต์", "มอเตอร์ไซค์"],
      "⚡ สาธารณูปโภค": ["ค่าไฟฟ้า", "ค่าน้ำประปา", "ค่าส่วนกลาง"],
      "🛡️ ประกันและภาษี": ["ภาษีรถยนต์", "ค่าประกันภัย"]
    };

    // --- ฟังก์ชันการสลับหน้าแอปพลิเคชัน ---
    window.showAddTradeForm = function() {
      document.getElementById('view-dashboard').classList.add('hidden');
      document.getElementById('view-add-trade').classList.remove('hidden');
    }
    window.hideAddTradeForm = function() {
      document.getElementById('view-dashboard').classList.remove('hidden');
      document.getElementById('view-add-trade').classList.add('hidden');
    }

    window.changeMenuTab = function(tabName) {
      document.querySelectorAll('nav button').forEach(btn => btn.className = 'flex flex-col items-center space-y-1 text-gray-400');
      document.getElementById(`nav-${tabName}`).className = 'flex flex-col items-center space-y-1 text-[#f08a24]';
      if(tabName === 'dashboard') hideAddTradeForm();
    }

    // --- ฟังก์ชันภายในฟอร์มกรอกข้อมูล ---
    window.switchDataType = function(type) {
      currentDataType = type;
      document.getElementById('dtype-STOCK').className = type === 'STOCK' ? 'py-2 rounded-lg font-bold text-xs bg-white text-slate-900 shadow-sm transition-all' : 'py-2 rounded-lg font-bold text-xs text-gray-500 transition-all';
      document.getElementById('dtype-EXPENSE').className = type === 'EXPENSE' ? 'py-2 rounded-lg font-bold text-xs bg-white text-slate-900 shadow-sm transition-all' : 'py-2 rounded-lg font-bold text-xs text-gray-500 transition-all';
      
      if(type === 'STOCK') {
        document.getElementById('box-symbol').classList.remove('hidden');
        document.getElementById('box-categories').classList.add('hidden');
        document.getElementById('box-trade-type').classList.remove('hidden');
        document.getElementById('box-optional-wrapper').classList.remove('hidden');
        document.getElementById('lbl-main-amount').innerText = 'Profit/Loss';
      } else {
        document.getElementById('box-symbol').classList.add('hidden');
        document.getElementById('box-categories').classList.remove('hidden');
        document.getElementById('box-trade-type').classList.add('hidden');
        document.getElementById('box-optional-wrapper').classList.add('hidden');
        document.getElementById('lbl-main-amount').innerText = 'จำนวนเงินจ่าย (บาท)';
        setupExpenseDropdowns();
      }
    }

    window.setTradeType = function(type) {
      currentTradeType = type;
      document.querySelectorAll('#box-trade-type button').forEach(b => b.className = 'py-2.5 rounded-xl font-bold text-sm bg-white border border-gray-200 text-gray-400 transition-all');
      
      const styles = {
        'BUY': 'bg-[#0f975d] text-white shadow-sm',
        'SELL': 'bg-rose-500 text-white shadow-sm',
        'DIVIDEND': 'bg-amber-500 text-white shadow-sm'
      };
      document.getElementById(`ttype-${type}`).className = `py-2.5 rounded-xl font-bold text-sm ${styles[type]} transition-all`;
    }

    window.toggleOptionalFields = function() {
      const el = document.getElementById('optional-fields');
      const arrow = document.getElementById('optional-arrow');
      el.classList.toggle('open');
      arrow.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function setupExpenseDropdowns() {
      const mSelect = document.getElementById('exp-main-cat');
      const sSelect = document.getElementById('exp-sub-cat');
      mSelect.innerHTML = '';
      Object.keys(customCategories).forEach(m => mSelect.innerHTML += `<option value="${m}">${m}</option>`);
      
      const updateSubs = () => {
        sSelect.innerHTML = '';
        customCategories[mSelect.value].forEach(s => sSelect.innerHTML += `<option value="${s}">${s}</option>`);
      };
      mSelect.onchange = updateSubs;
      updateSubs();
    }

    // --- ระบบจัดเก็บและดึงข้อมูลจากฐานข้อมูลระดับวินาที ---
    document.getElementById('btn-save-trade').addEventListener('click', async () => {
      const amount = parseFloat(document.getElementById('trade-amount').value);
      const date = document.getElementById('trade-date').value;
      if(!amount || !date) { alert('กรุณากรอกข้อมูลตัวเลขหลักและวันที่ให้ครบถ้วน'); return; }

      if(currentDataType === 'STOCK') {
        const symbol = document.getElementById('trade-symbol').value.trim().toUpperCase();
        if(!symbol) { alert('กรุณาระบุชื่อย่อหุ้น'); return; }
        
        await addDoc(collection(db, "transactions"), {
          symbol, type: currentTradeType, total: amount, date, isStock: true,
          entryPrice: parseFloat(document.getElementById('opt-entry-price').value) || 0,
          exitPrice: parseFloat(document.getElementById('opt-exit-price').value) || 0,
          lotSize: parseFloat(document.getElementById('opt-lot-size').value) || 0,
          exitDate: document.getElementById('opt-exit-date').value || '',
          notes: document.getElementById('opt-notes').value.trim()
        });
        document.getElementById('trade-symbol').value = '';
      } else {
        const mCat = document.getElementById('exp-main-cat').value;
        const sCat = document.getElementById('exp-sub-cat').value;
        await addDoc(collection(db, "household_expenses"), {
          category: `${mCat} (${sCat})`, mainCat: mCat, subCat: sCat, amount, date, isStock: false
        });
      }

      document.getElementById('trade-amount').value = '';
      // รีเซ็ตฟิลด์ย่อย
      document.getElementById('opt-entry-price').value = '';
      document.getElementById('opt-exit-price').value = '';
      document.getElementById('opt-lot-size').value = '';
      document.getElementById('opt-exit-date').value = '';
      document.getElementById('opt-notes').value = '';
      hideAddTradeForm();
    });

    // ดึงข้อมูล Realtime
    onSnapshot(collection(db, "transactions"), (snap) => {
      allTransactions = allTransactions.filter(t => !t.isStock);
      snap.forEach(d => allTransactions.push({id: d.id, ...d.data()}));
      processAndRender();
    });
    onSnapshot(collection(db, "household_expenses"), (snap) => {
      allTransactions = allTransactions.filter(t => t.isStock);
      snap.forEach(d => allTransactions.push({id: d.id, ...d.data()}));
      processAndRender();
    });

    // --- ฟังก์ชันการคำนวณและประมวลผลสรุปบัญชีแยกหุ้น ---
    function processAndRender() {
      let netPnL = 0;
      let totalDiv = 0;
      let totalExp = 0;
      let stockMap = {};

      allTransactions.forEach(item => {
        if(item.isStock) {
          if(!stockMap[item.symbol]) {
            stockMap[item.symbol] = { pnl: 0, div: 0, tradesCount: 0 };
          }
          if(item.type === 'BUY') {
            stockMap[item.symbol].pnl -= item.total; // จ่ายเงินซื้อคือกำไรติดลบเบื้องต้น
            netPnL -= item.total;
          } else if(item.type === 'SELL') {
            stockMap[item.symbol].pnl += item.total;
            netPnL += item.total;
          } else if(item.type === 'DIVIDEND') {
            stockMap[item.symbol].div += item.total;
            totalDiv += item.total;
          }
          stockMap[item.symbol].tradesCount++;
        } else {
          totalExp += item.amount;
        }
      });

      document.getElementById('total-pnl-display').innerText = `฿${netPnL.toLocaleString('th-TH', {minimumFractionDigits:2})}`;
      document.getElementById('total-div-display').innerText = `฿${totalDiv.toLocaleString('th-TH', {minimumFractionDigits:2})}`;
      document.getElementById('total-exp-display').innerText = `฿${totalExp.toLocaleString('th-TH', {minimumFractionDigits:2})}`;

      // เรนเดอร์กล่องรายงานแยกแต่ละตัวหุ้น
      const rList = document.getElementById('stock-report-list');
      rList.innerHTML = '';

      for(const [symbol, data] of Object.entries(stockMap)) {
        const pnlColor = data.pnl >= 0 ? 'text-[#0f975d]' : 'text-rose-500';
        const pnlSign = data.pnl >= 0 ? '+' : '';
        rList.innerHTML += `
          <div class="bg-gray-50 border border-gray-100 p-4 rounded-xl flex justify-between items-center shadow-sm">
            <div>
              <p class="text-base font-black text-slate-900">${symbol}</p>
              <p class="text-[11px] text-gray-400 font-medium mt-0.5">ธุรกรรมรวม: ${data.tradesCount} รายการ</p>
            </div>
            <div class="text-right">
              <p class="${pnlColor} font-black text-sm">${pnlSign}฿${data.pnl.toFixed(2)}</p>
              <p class="text-xs font-bold text-amber-500 mt-0.5">ปันผล: ฿${data.div.toFixed(2)}</p>
            </div>
          </div>`;
      }

      if(Object.keys(stockMap).length === 0) {
        rList.innerHTML = `
          <div class="text-center py-12 border-2 border-dashed border-gray-200 rounded-2xl bg-white">
            <p class="text-gray-400 font-bold text-sm">No trading data yet</p>
            <p class="text-xs text-gray-400 mt-1">Start adding trades to see your statistics</p>
          </div>`;
      }
    }
  </script>
</body>
</html>
