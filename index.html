<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ซ่อนแถบ Scrollbar เพื่อความสวยงามบนมือถือ */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-black text-white antialiased hide-scrollbar">

  <div class="max-w-md mx-auto min-h-screen flex flex-col p-4 pb-24">
    
    <section id="view-reports" class="tab-view space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-black">รายงานสรุป</h1>
          <p class="text-xs text-zinc-500 font-bold">แยกตามหมวดหมู่ย่อย</p>
        </div>
        <button id="btn-trigger-category-mgmt" class="bg-zinc-900 border border-zinc-800 text-amber-400 font-bold text-xs px-3 py-2 rounded-xl">
          ⚙️ จัดการหมวดหมู่
        </button>
      </div>

      <div>
        <h3 class="text-xs font-black text-emerald-400 mb-2 uppercase tracking-wider">💰 รายรับสุทธิ</h3>
        <div id="report-income-sub-group" class="space-y-2"></div>
      </div>

      <div>
        <h3 class="text-xs font-black text-rose-400 mb-2 uppercase tracking-wider">⚡ รายจ่ายรวม</h3>
        <div id="report-expense-sub-group" class="space-y-2"></div>
      </div>

      <div>
        <h3 class="text-xs font-black text-cyan-400 mb-2 uppercase tracking-wider">📈 หุ้น / สินทรัพย์</h3>
        <div id="report-stock-sub-group" class="space-y-2"></div>
      </div>
    </section>

    <section id="view-report-detail" class="tab-view hidden space-y-5">
      <div class="flex items-center space-x-3 pb-3 border-b border-zinc-900">
        <button type="button" id="btn-back-report-detail" class="text-zinc-400 text-3xl font-bold p-1 hover:text-white cursor-pointer">←</button>
        <div>
          <h2 id="report-detail-title" class="text-[20px] font-black text-white leading-tight">รายละเอียดประวัติ</h2>
          <p id="report-detail-subtitle" class="text-xs text-zinc-500 font-bold uppercase tracking-widest"></p>
        </div>
      </div>

      <div class="bg-zinc-900/50 border border-zinc-800/60 rounded-2xl p-4 flex justify-between items-center">
        <div>
          <p class="text-[10px] font-black text-zinc-500 uppercase">ยอดรวมเฉพาะรายการนี้</p>
          <h3 id="report-detail-sum" class="text-2xl font-black">฿0.00</h3>
        </div>
        <div class="text-right">
          <p class="text-[10px] font-black text-zinc-500 uppercase">จำนวนครั้ง</p>
          <p id="report-detail-count" class="text-lg font-bold text-white">0 รายการ</p>
        </div>
      </div>

      <div id="report-detail-list" class="space-y-2.5 max-h-[60vh] overflow-y-auto hide-scrollbar"></div>
    </section>

    <section id="view-category-manager" class="tab-view hidden space-y-4">
      <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
        <h2 class="text-lg font-black text-white">ตั้งค่าหมวดหมู่ระบบ</h2>
      </div>

      <div class="grid grid-cols-3 gap-2 text-center bg-zinc-900 p-1 rounded-xl">
        <div id="mtype-INCOME" class="py-2 rounded-lg font-black text-[12px] bg-zinc-800 text-white cursor-pointer">รายได้</div>
        <div id="mtype-EXPENSE" class="py-2 rounded-lg font-bold text-[12px] text-zinc-500 cursor-pointer">รายจ่าย</div>
        <div id="mtype-STOCK" class="py-2 rounded-lg font-bold text-[12px] text-zinc-500 cursor-pointer">หุ้น/ลงทุน</div>
      </div>

      <div class="bg-zinc-900/20 border border-zinc-800/60 p-4 rounded-2xl space-y-2">
        <label class="block text-xs text-zinc-400 font-bold">1. เพิ่มหมวดหมู่หลัก (จิ้มที่รูปเพื่อเปลี่ยนอิโมจิ)</label>
        <div class="flex space-x-2">
          <input type="text" id="mgmt-main-icon" value="📁" class="w-14 text-center bg-zinc-900 border border-zinc-800 text-white rounded-xl py-3 font-bold text-lg cursor-pointer" readonly>
          <input type="text" id="mgmt-new-main" class="flex-1 bg-zinc-900 border border-zinc-800 text-white rounded-xl px-4 py-3 text-sm font-bold" placeholder="ชื่อหมวดหมู่หลัก เช่น โรงแรม/ทริป">
          <button id="btn-mgmt-add-main" class="bg-amber-500 text-black font-black px-4 rounded-xl text-sm active:bg-amber-600">เพิ่ม</button>
        </div>
      </div>

      <div class="bg-zinc-900/20 border border-zinc-800/60 p-4 rounded-2xl space-y-3">
        <label class="block text-xs text-zinc-400 font-bold">2. เลือกหมวดหมู่หลัก เพื่อผูกหมวดหมู่ย่อย</label>
        <select id="mgmt-select-main" class="w-full bg-zinc-900 border border-zinc-800 text-white rounded-xl px-4 py-3 text-sm font-bold"></select>
        
        <div class="flex space-x-2">
          <input type="text" id="mgmt-sub-icon" value="🔹" class="w-14 text-center bg-zinc-900 border border-zinc-800 text-white rounded-xl py-3 font-bold text-lg cursor-pointer" readonly>
          <input type="text" id="mgmt-new-sub" class="flex-1 bg-zinc-900 border border-zinc-800 text-white rounded-xl px-4 py-3 text-sm font-bold" placeholder="ชื่อหมวดหมู่ย่อย เช่น รับส่งสนามบิน">
          <button id="btn-mgmt-add-sub" class="bg-amber-500 text-black font-black px-3 rounded-xl text-sm active:bg-amber-600">เพิ่มย่อย</button>
        </div>
      </div>

      <div class="pt-2">
        <p class="text-xs font-black text-zinc-500 uppercase tracking-wider mb-2">ผังโครงสร้างหมวดหมู่ปัจจุบัน</p>
        <div id="mgmt-tree-display" class="bg-zinc-900/40 border border-zinc-800/50 rounded-2xl p-4 divide-y divide-zinc-800/60"></div>
      </div>
      
      <button id="btn-back-category-mgmt" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-xl text-sm mt-2">ย้อนกลับหน้าหลัก</button>
    </section>

  </div>

  <script type="module">
    import { initCategoryMgmt } from "./category.js";
    import { renderReports } from "./report.js";

    // จำลองข้อมูลเพื่อทดสอบการแสดงผลประวัติในหน้ารายงาน (เมื่อใช้งานจริง ข้อมูลจะถูกส่งมาจาก Firebase ของพี่)
    const mockIncome = {
      "🚗 ThaiRide Travel": [
        { date: "2026-06-21", mainCat: "🚗 ThaiRide Travel", amount: 3500, type: "รับส่งสนามบิน" },
        { date: "2026-06-19", mainCat: "🚗 ThaiRide Travel", amount: 4800, type: "เช่ารถส่วนบุคคล" },
        { date: "2026-06-15", mainCat: "🚗 ThaiRide Travel", amount: 3500, type: "รับส่งสนามบิน" }
      ],
      "📊 การลงทุน": [
        { date: "2026-06-20", mainCat: "📊 การลงทุน", amount: 1250, type: "ปันผลหุ้น" }
      ]
    };

    const mockExpense = {
      "⚡ สาธารณูปโภค": [
        { date: "2026-06-18", mainCat: "⚡ สาธารณูปโภค", amount: 2400, type: "ค่าไฟฟ้า" },
        { date: "2026-06-10", mainCat: "⚡ สาธารณูปโภค", amount: 850, type: "COWAY" }
      ],
      "🔧 ซ่อมบำรุง": [
        { date: "2026-06-12", mainCat: "🔧 ซ่อมบำรุง", amount: 1800, type: "เปลี่ยนน้ำมันเครื่อง" }
      ]
    };

    const mockStock = {
      "🏦 กลุ่มธนาคาร": [
        { date: "2026-06-14", mainCat: "🇹🇭 หุ้นไทย (SET)", total: 15000, type: "BUY SCB" }
      ]
    };

    // รันระบบเมื่อเปิดหน้าจอ
    document.addEventListener('DOMContentLoaded', () => {
      initCategoryMgmt();
      renderReports(mockStock, mockExpense, mockIncome);
    });
  </script>
</body>
</html>
