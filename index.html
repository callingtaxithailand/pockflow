<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow - Dime Stock Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col p-4 bg-white shadow-lg">
    
    <header class="flex justify-between items-center py-4 border-b border-slate-100">
      <h1 class="text-3xl font-black tracking-tight text-indigo-600">PocketFlow</h1>
      <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">Dime Portfolio</span>
    </header>

    <section class="my-6 bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-2xl p-6 shadow-md">
      <p class="text-xs uppercase tracking-wider text-slate-400 font-medium">มูลค่าพอร์ตโดยรวม</p>
      <h2 class="text-4xl font-extrabold mt-1 mb-4">$1,245.80</h2>
      
      <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-700">
        <div>
          <p class="text-xs text-slate-400">กำไร / ขาดทุนรวม</p>
          <p class="text-2xl font-bold text-emerald-400">+$120.40</p>
        </div>
        <div>
          <p class="text-xs text-slate-400">เงินปันผลรวม</p>
          <p class="text-2xl font-bold text-amber-400">$35.20</p>
        </div>
      </div>
    </section>

    <section class="mb-6 bg-slate-100 rounded-xl p-4">
      <h3 class="text-sm font-bold uppercase text-slate-500 mb-3">บันทึกรายการใหม่</h3>
      <div class="grid grid-cols-3 gap-2 mb-3">
        <button class="bg-emerald-600 text-white font-bold py-2 rounded-lg text-center shadow-sm">ซื้อ (BUY)</button>
        <button class="bg-rose-600 text-white font-bold py-2 rounded-lg text-center shadow-sm">ขาย (SELL)</button>
        <button class="bg-amber-500 text-white font-bold py-2 rounded-lg text-center shadow-sm">ปันผล (DIV)</button>
      </div>
      
      <div class="space-y-3">
        <input type="text" placeholder="ชื่อหุ้น เช่น AAPL" class="w-full bg-white border border-slate-200 rounded-lg p-3 text-lg font-bold uppercase focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <div class="grid grid-cols-2 gap-2">
          <input type="number" placeholder="จำนวนหุ้น" class="w-full bg-white border border-slate-200 rounded-lg p-3 text-lg font-semibold">
          <input type="number" placeholder="ราคา/หุ้น" class="w-full bg-white border border-slate-200 rounded-lg p-3 text-lg font-semibold">
        </div>
        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-3 rounded-xl transition shadow-md">บันทึกรายการ</button>
      </div>
    </section>

    <section class="flex-1">
      <h3 class="text-lg font-bold text-slate-700 mb-3">ประวัติรายการ</h3>
      <div class="space-y-3">
        
        <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl shadow-xs">
          <div class="flex items-center space-x-3">
            <div class="bg-emerald-100 text-emerald-700 p-2 rounded-lg font-bold text-xs">BUY</div>
            <div>
              <p class="text-lg font-bold leading-tight">AAPL</p>
              <p class="text-xs text-slate-400">19 มิ.ย. 2026 • 2 หุ้น</p>
            </div>
          </div>
          <p class="text-xl font-bold text-slate-800">-$360.00</p>
        </div>

        <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl shadow-xs">
          <div class="flex items-center space-x-3">
            <div class="bg-amber-100 text-amber-700 p-2 rounded-lg font-bold text-xs">DIV</div>
            <div>
              <p class="text-lg font-bold leading-tight">O (Realty Income)</p>
              <p class="text-xs text-slate-400">15 มิ.ย. 2026</p>
            </div>
          </div>
          <p class="text-xl font-bold text-emerald-600">+$15.20</p>
        </div>

      </div>
    </section>

  </div>

</body>
</html>
