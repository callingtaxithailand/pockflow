<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
        .active { background: #007bff; border-color: #007bff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #333; padding: 10px 5px; text-align: left; }
        .clickable { color: #007bff; text-decoration: underline; cursor: pointer; }
        #add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background-color: #007bff; border-radius: 50%; border: none; color: white; font-size: 30px; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 200; }
        input, select { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .tx-buy { color: #fff; }
        .tx-dividend { color: #28a745; } /* สีเขียวสำหรับปันผล */
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">ตปท</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">ทอง</button>
    </div>

    <div class="summary-box">
        <div>รวมยอดซื้อ: <span id="sum-buy">0</span></div>
        <div>ยอดปันผล/กำไร: <span id="sum-profit">0</span></div>
    </div>

    <div id="content-area"></div>
</div>

<button id="add-btn" onclick="openModal('modal-add')">+</button>

<div id="modal-add" class="modal">
    <h3>บันทึกรายการ</h3>
    <input type="date" id="date">
    <select id="type-select">
        <option value="buy">ซื้อหุ้น</option>
        <option value="sell">ขายหุ้น</option>
        <option value="dividend">รับเงินปันผล</option>
    </select>
    <input type="text" id="name" placeholder="ชื่อหุ้น">
    <input type="number" id="qty" placeholder="จำนวน (ถ้ามี)">
    <input type="number" id="price" placeholder="จำนวนเงิน">
    <button class="nav-btn" onclick="saveData()" style="width:100%; background:#007bff;">บันทึก</button>
    <button class="nav-btn" onclick="closeModal('modal-add')" style="width:100%; margin-top:10px;">ปิด</button>
</div>

<div id="modal-detail" class="modal">
    <h3 id="detail-title"></h3>
    <div id="detail-content"></div>
    <button class="nav-btn" onclick="closeModal('modal-detail')" style="width:100%; margin-top:20px; background:#444;">ปิด</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function showSection(type) {
        localStorage.setItem('activePage', type);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        
        let filtered = data.filter(i => i.category === type);
        let grouped = {};
        
        filtered.forEach(i => {
            if(!grouped[i.name]) grouped[i.name] = { buy: 0, profit: 0 };
            if(i.txType === 'buy') grouped[i.name].buy += Number(i.price);
            else grouped[i.name].profit += Number(i.price);
        });

        let html = `<table><tr><th>ชื่อหุ้น</th><th>ยอดซื้อ</th><th>ปันผล/กำไร</th></tr>`;
        for(let name in grouped) {
            html += `<tr>
                <td class="clickable" onclick="showDetail('${name}')">${name}</td>
                <td>${grouped[name].buy}</td>
                <td class="tx-dividend">${grouped[name].profit > 0 ? '+'+grouped[name].profit : 0}</td>
            </tr>`;
        }
        
        document.getElementById('content-area').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = filtered.filter(i => i.txType === 'buy').reduce((s, i) => s + Number(i.price), 0);
        document.getElementById('sum-profit').innerText = filtered.filter(i => i.txType === 'dividend' || i.txType === 'sell').reduce((s, i) => s + Number(i.price), 0);
    }

    function showDetail(name) {
        let items = data.filter(i => i.name === name);
        document.getElementById('detail-title').innerText = "ประวัติ: " + name;
        let html = `<table><tr><th>วันที่</th><th>ประเภท</th><th>เงิน</th></tr>` + 
            items.map(i => `<tr><td>${i.date}</td><td>${i.txType}</td><td>${i.price}</td></tr>`).join('') + `</table>`;
        document.getElementById('detail-content').innerHTML = html;
        openModal('modal-detail');
    }

    function saveData() {
        const item = {
            id: Date.now(),
            category: localStorage.getItem('activePage') || 'thai',
            txType: document.getElementById('type-select').value,
            date: document.getElementById('date').value,
            name: document.getElementById('name').value,
            qty: document.getElementById('qty').value,
            price: document.getElementById('price').value
        };
        data.push(item);
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal('modal-add');
        showSection(item.category);
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onload = () => showSection(localStorage.getItem('activePage') || 'thai');
</script>
</body>
</html>
