<section id="view-trades" class="tab-view space-y-4">
  <h2 class="text-[20px] font-black text-white px-2">ประวัติธุรกรรม</h2>

  <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 space-y-3">
    <input type="text" id="search-bar" placeholder="ค้นหาชื่อหุ้นหรือรายการ..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm">
    <div class="grid grid-cols-2 gap-2">
      <input type="date" id="filter-date" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
      <select id="filter-category" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-sm">
        <option value="">ทุกหมวดหมู่</option>
        <option value="STOCK">หุ้น / สินทรัพย์</option>
        <option value="EXPENSE">รายจ่ายในบ้าน</option>
      </select>
    </div>
  </div>

  <div id="trades-list-container" class="space-y-4">
    <div class="trade-group">
      <h3 class="text-amber-400 font-bold text-sm mb-2 uppercase">15 มิ.ย. 2026</h3>
      <div class="bg-zinc-900 p-3 rounded-lg border border-zinc-800 flex justify-between">
        <div>
          <p class="font-bold">แชร์ (ชมพู่)</p>
          <p class="text-xs text-zinc-500">หมวด: รายจ่ายในบ้าน</p>
        </div>
        <span class="font-black text-rose-400">฿1,000</span>
      </div>
    </div>
  </div>
</section>
