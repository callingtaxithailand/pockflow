<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow - Restored & Optimized</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-black text-white font-sans">
  <div class="max-w-md mx-auto min-h-screen bg-black border-x border-zinc-900 pb-26">
    <main class="p-5">
      <section id="view-trades" class="space-y-4">
        <h2 class="text-2xl font-black mb-4">ประวัติธุรกรรมทั้งหมด</h2>
        
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 space-y-3">
          <input type="text" id="trade-search" oninput="renderFilteredTrades()" placeholder="🔍 ค้นหาชื่อหุ้น หรือ รายการ..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-white">
          <div class="grid grid-cols-2 gap-2">
            <input type="date" id="trade-filter-date" onchange="renderFilteredTrades()" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm text-zinc-400">
            <select id="trade-filter-type" onchange="renderFilteredTrades()" class="bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-sm text-zinc-400">
              <option value="ALL">ทุกประเภท</option>
              <option value="STOCK">หุ้น / สินทรัพย์</option>
              <option value="EXPENSE">รายจ่ายในบ้าน</option>
            </select>
          </div>
        </div>

        <div id="filtered-trades-list" class="space-y-4">
          </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
      projectId: "pocketflow-49763",
      // ... (ใส่ค่า Config เดิมของคุณให้ครบ)
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allTransactions = [];

    // ดึงข้อมูลจากฐานข้อมูล Firebase
    function loadData() {
      onSnapshot(collection(db, "transactions"), (snap) => {
        snap.forEach(d => allTransactions.push({id: d.id, ...d.data(), isStock: true}));
        renderFilteredTrades();
      });
      onSnapshot(collection(db, "household_expenses"), (snap) => {
        snap.forEach(d => allTransactions.push({id: d.id, ...d.data(), isStock: false}));
        renderFilteredTrades();
      });
    }

    window.renderFilteredTrades = function() {
      const searchTerm = document.getElementById('trade-search').value.toLowerCase();
      const filterDate = document.getElementById('trade-filter-date').value;
      const filterType = document.getElementById('trade-filter-type').value;
      const container = document.getElementById('filtered-trades-list');
      
      let filtered = allTransactions.filter(t => {
        const title = (t.symbol || t.category || '').toLowerCase();
        return title.includes(searchTerm) && 
               (filterDate ? t.date === filterDate : true) &&
               (filterType === 'ALL' ? true : (filterType === 'STOCK' ? t.isStock : !t.isStock));
      });

      container.innerHTML = '';
      const grouped = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).reduce((acc, curr) => {
        (acc[curr.date] = acc[curr.date] || []).push(curr);
        return acc;
      }, {});

      Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a)).forEach(date => {
        const dateLabel = new Date(date).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
        container.innerHTML += `<h3 class="text-amber-400 font-black text-xs uppercase tracking-widest pl-1 pt-4">${dateLabel}</h3>`;
        grouped[date].forEach(t => {
          container.innerHTML += `
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex justify-between">
              <span class="font-bold">${t.symbol || t.category}</span>
              <span class="font-black text-rose-400">฿${(t.total || t.amount).toLocaleString()}</span>
            </div>`;
        });
      });
    };

    loadData();
  </script>
</body>
</html>
