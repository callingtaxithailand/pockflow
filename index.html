<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { /* ใส่ค่า Firebase ของคุณที่นี่ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ฟังก์ชันบันทึก
        window.saveData = async () => {
            const market = document.getElementById('market').value; // เช่น หุ้นไทย
            const asset = document.getElementById('asset').value;   // เช่น TISCO
            const amount = parseFloat(document.getElementById('amount').value);
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            const fee = parseFloat(document.getElementById('fee').value) || 0;

            if(!asset || !amount) return alert("กรุณากรอกข้อมูลให้ครบ");

            await addDoc(collection(db, "transactions"), {
                market, asset, amount, tax, fee,
                date: new Date().toISOString()
            });
            alert("บันทึกสำเร็จ");
        };

        // แสดงผล
        onSnapshot(collection(db, "transactions"), (snapshot) => {
            const report = {};
            snapshot.forEach((doc) => {
                const d = doc.data();
                if (!report[d.market]) report[d.market] = {};
                if (!report[d.market][d.asset]) report[d.market][d.asset] = { income: 0, tax: 0, fee: 0 };
                
                report[d.market][d.asset].income += d.amount;
                report[d.market][d.asset].tax += d.tax;
                report[d.market][d.asset].fee += d.fee;
            });

            const list = document.getElementById('reportList');
            list.innerHTML = Object.keys(report).map(mkt => `
                <div class="mb-6">
                    <h3 class="text-3xl font-bold text-blue-900 border-b-4 mb-2">${mkt}</h3>
                    ${Object.keys(report[mkt]).map(ast => `
                        <div class="bg-white p-4 rounded-xl shadow mb-2 flex justify-between items-center">
                            <div>
                                <p class="text-2xl font-bold">${ast}</p>
                                <p class="text-sm text-gray-500">ภาษี: ${report[mkt][ast].tax} | ค่าธรรมเนียม: ${report[mkt][ast].fee}</p>
                            </div>
                            <p class="text-2xl font-bold text-green-600">
                                ${(report[mkt][ast].income - report[mkt][ast].tax - report[mkt][ast].fee).toLocaleString()}
                            </p>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        });
    </script>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-5xl font-black text-center text-blue-900 my-8">PocketFlow</h1>

    <!-- Form -->
    <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4 mb-8">
        <select id="market" class="w-full p-6 text-2xl border-2 rounded-2xl">
            <option value="หุ้นไทย">หุ้นไทย</option>
            <option value="หุ้นสหรัฐ">หุ้นสหรัฐ</option>
            <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <input id="asset" type="text" placeholder="ชื่อหุ้น (เช่น TISCO, SCB)" class="w-full p-6 text-2xl border-2 rounded-2xl">
        <input id="amount" type="number" placeholder="จำนวนเงินปันผล" class="w-full p-6 text-2xl border-2 rounded-2xl">
        <div class="grid grid-cols-2 gap-4">
            <input id="tax" type="number" placeholder="ภาษี" class="p-6 text-xl border-2 rounded-2xl">
            <input id="fee" type="number" placeholder="ค่าธรรมเนียม" class="p-6 text-xl border-2 rounded-2xl">
        </div>
        <button onclick="saveData()" class="w-full bg-blue-600 text-white py-6 rounded-2xl text-3xl font-bold">บันทึกรายการ</button>
    </div>

    <div id="reportList"></div>
</body>
</html>
