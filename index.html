<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketFlow - Dime</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* เอฟเฟกต์การกาง-พับเก็บเมนูแบบนุ่มนวลสไตล์ Native Application */
    .slide-down {
      transition: all 0.3s ease-out;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
    }
    .slide-down.open {
      max-height: 800px;
      opacity: 1;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">

  <!-- กรอบจำลองหน้าต่างแอปพลิเคชันมือถือ (Mobile View Container) บนพื้นหลังดำ -->
  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-black shadow-2xl relative pb-24 border-x border-zinc-900">
    
    <!-- ส่วนเนื้อหาหลักภายในแอป -->
    <main class="flex-1 p-5">
      
      <!-- ================= LOGO DESIGN (โฉมใหม่ธีมพื้นดำ) ================= -->
      <div class="flex flex-col items-center justify-center py-6 mb-4 select-none">
        <div class="flex items-center space-x-2.5">
          <!-- โลโก้ใหม่: สัญลักษณ์เหรียญทองติดปีกโคจรรอบดวงดาวสไตล์อวกาศลึกลับ เข้ากับพื้นหลังดำ -->
          <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 via-purple-600 to-amber-400 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-indigo-500/20 font-black">
            🪙
          </div>
          <div class="flex flex-col">
            <h1 class="text-2xl font-black tracking-tighter text-white leading-none">PocketFlow</h1>
            <span class="text-[10px] uppercase tracking-widest font-bold text-amber-400 mt-1 pl-0.5">DIME EDITION</span>
          </div>
        </div>
      </div>

      <!-- ================= VIEW 1: DASHBOARD สรุปยอดเงินรวม ================= -->
      <section id="view-dashboard" class="space-y-5">
        <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl p-5 text-center py-8 shadow-xl">
          <p class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-1">ยอดรวมกำไร/ขาดทุนพอร์ตสุทธิ</p>
          <h2 id="total-pnl-display" class="text-4xl font-black text-white tracking-tight">฿0.00</h2>
        </div>

        <!-- กล่องแสดงสถิติย่อยแบบ Grid -->
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800/60 shadow-md">
            <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-wider">เงินปันผลสะสม</p>
            <p id="total-div-display" class="text-lg font-black text-amber-400 mt-1">฿0.00</p>
          </div>
          <div class="bg-zinc-900/60 p-4 rounded-xl border border-zinc-800/60 shadow-md">
            <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-wider">ค่าใช้จ่ายในบ้านรวม</p>
            <p id="total-exp-display" class="text-lg font-black text-rose-400 mt-1">฿0.00</p>
          </div>
        </div>

        <!-- ส่วนของรายงานข้อมูลหุ้นรายตัวเชิงลึก -->
        <div class="pt-2">
          <div class="flex justify-between items-center mb-3.5">
            <h3 class="text-xs font-bold text-zinc-400 tracking-widest uppercase">รายงานแยกตามรายชื่อหุ้น</h3>
            <button onclick="showAddTradeForm()" class="bg-amber-500 text-black text-xs font-black px-3.5 py-2 rounded-xl shadow-md hover:bg-amber-400 transition-all flex items-center space-x-1">
              <span>＋</span> <span>Add Trade</span>
            </button>
          </div>
          
          <div id="stock-report-list" class="space-y-2.5">
            <!-- รายชื่อหุ้นและสถิติจะถูกโหลดเข้ามาแสดงผลที่นี่ผ่าน Firebase -->
          </div>
        </div>
      </section>

      <!-- ================= VIEW 2: ฟอร์ม ADD TRADE (ถอดแบบโครงสร้างจากรูปภาพต้นฉบับ) ================= -->
      <section id="view-add-trade" class="hidden space-y-5">
        <!-- แถบหัวฟอร์มด้านบน -->
        <div class="flex items-center space-x-3 pb-2 border-b border-zinc-900">
          <button onclick="hideAddTradeForm()" class="text-zinc-400 text-xl font-bold p-1 hover:text-white transition-colors">←</button>
          <h2 class="text-xl font-black text-white">Add Trade</h2>
        </div>

        <div class="space-y-4">
          <!-- เมนูสลับประเภทข้อมูล (Data Type Toggle) -->
          <div>
            <label class="text-[11px] font-bold text-zinc-400 uppercase tracking-widest block mb-1.5">Data Type</label>
            <div class="grid grid-cols-2 gap-2 p-1 bg-zinc-900 rounded-xl border border-zinc-800">
              <button type="button" onclick="switchDataType('STOCK')" id="dtype-STOCK" class="py-2 rounded-lg font-black text-xs bg-zinc-800 text-white shadow-sm transition-all">📈 หุ้น / สินทรัพย์</button>
              <button type="button" onclick="switchDataType('EXPENSE')" id="dtype-EXPENSE" class="py-2 rounded-lg font-black text-xs text-zinc-500 transition-all">💸 ค่าใช้จ่ายในบ้าน</button>
            </div>
          </div>

          <!-- ฟิลด์รับค่าชื่อย่อหุ้น (Symbol) -->
          <div id="box-symbol">
            <label class="text-xs font-bold text-zinc-300 block mb-1.5">Symbol</label>
            <input type="text" id="trade-symbol" placeholder="เช่น AAPL, TISCO, NVDA" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-base font-black uppercase text-white placeholder-zinc-700 focus:outline-none focus:border-indigo-500 transition-colors">
          </div>

          <!-- เมนูดรอปดาวน์หมวดหมู่ค่าใช้จ่ายในบ้าน -->
          <div id="box-categories" class="hidden space-y-3">
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="text-xs font-bold text-zinc-300 block mb-1.5">หมวดหมู่หลัก</label>
                <select id="exp-main-cat" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm font-bold text-white focus:outline-none focus:border-indigo-500"></select>
              </div>
              <div>
                <label class="text-xs font-bold text-zinc-300 block mb-1.5">หมวดหมู่ย่อย</label>
                <select id="exp-sub-cat" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm font-bold text-white focus:outline-none focus:border-indigo-500"></select>
              </div>
            </div>
          </div>

          <!-- ปุ่มเลือกประเภทธุรกรรมหุ้น (Trade Type: BUY / SELL / DIVIDEND) -->
          <div id="box-trade-type">
            <label class="text-xs font-bold text-zinc-300 block mb-1.5">Trade Type</label>
            <div class="grid grid-cols-3 gap-2">
              <button type="button" onclick="setTradeType('BUY')" id="ttype-BUY" class="py-2.5 rounded-xl font-black text-sm bg-emerald-600 text-white shadow-md transition-all">BUY</button>
              <button type="button" onclick="setTradeType('SELL')" id="ttype-SELL" class="py-2.5 rounded-xl font-bold text-sm bg-zinc-900 border border-zinc-800 text-zinc-400 transition-all">SELL</button>
              <button type="button" onclick="setTradeType('DIVIDEND')" id="ttype-DIVIDEND" class="py-2.5 rounded-xl font-bold text-sm bg-zinc-900 border border-zinc-800 text-zinc-400 transition-all">ปันผล</button>
            </div>
          </div>

          <!-- ยอดจำนวนเงินหลัก (Profit/Loss หรือ ยอดรายจ่าย) -->
          <div>
            <label id="lbl-main-amount" class="text-xs font-bold text-zinc-300 block mb-1.5">Profit/Loss</label>
            <div class="relative">
              <span class="absolute left-4 top-3 text-lg font-black text-amber-400">฿</span>
              <input type="number" step="any" id="trade-amount" placeholder="0.00" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 pl-8 text-lg font-black text-white placeholder-zinc-700 focus:outline-none focus:border-indigo-500 transition-colors">
            </div>
          </div>

          <!-- วันที่ระบุบันทึกรายการ -->
          <div>
            <label class="text-xs font-bold text-zinc-300 block mb-1.5">Entry Date</label>
            <input type="date" id="trade-date" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-base font-bold text-white focus:outline-none focus:border-indigo-500">
          </div>

          <!-- ส่วนกรอกรายละเอียดเสริมยืดหยุ่นได้ (Additional Information - ถอดแบบตามรูปภาพที่ 3 และ 4) -->
          <div id="box-optional-wrapper" class="border border-zinc-800/80 rounded-xl overflow-hidden bg-zinc-950">
            <button type="button" onclick="toggleOptionalFields()" class="w-full p-3.5 flex justify-between items-center text-xs font-bold text-zinc-200 bg-zinc-900 border-b border-zinc-800/50">
              <div class="flex items-center space-x-2">
                <span class="text-indigo-400 text-sm">ℹ️</span>
                <span>Additional Information (Optional)</span>
              </div>
              <span id="optional-arrow" class="text-zinc-500 text-xs transition-transform duration-200">▼</span>
            </button>
            
            <!-- ฟิลด์แอบซ่อนที่จะสไลด์กางเปิดออกมาเมื่อคลิก -->
            <div id="optional-fields" class="slide-down p-4 space-y-4 bg-zinc-900/40">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-xs font-medium text-zinc-400 block mb-1">Entry Price</label>
                  <input type="number" step="any" id="opt-entry-price" placeholder="0.00" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-sm font-bold text-white focus:outline-none">
                </div>
                <div>
                  <label class="text-xs font-medium text-zinc-400 block mb-1">Exit Price</label>
                  <input type="number" step="any" id="opt-exit-price" placeholder="0.00" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-sm font-bold text-white focus:outline-none">
                </div>
              </div>
              <div>
                <label class="text-xs font-medium text-zinc-400 block mb-1">Lot Size / Volume</label>
                <input type="number" step="any" id="opt-lot-size" placeholder="เช่น 100, 0.25" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-sm font-bold text-white focus:outline-none">
              </div>
              <div>
                <label class="text-xs font-medium text-zinc-400 block mb-1">Exit Date</label>
                <input type="date" id="opt-exit-date" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-sm font-bold text-white focus:outline-none">
              </div>
              <div>
                <label class="text-xs font-medium text-zinc-400 block mb-1">Notes</label>
                <textarea id="opt-notes" rows="3" placeholder="เขียนบันทึกช่วยจำสำหรับธุรกรรมนี้..." class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-sm text-white placeholder-zinc-700 focus:outline-none"></textarea>
              </div>
            </div>
          </div>

          <!-- ปุ่มควบคุมบันทึกข้อมูลด้านท้ายฟอร์ม -->
          <div class="pt-2 space-y-2.5">
            <button type="button" id="btn-save-trade" class="w-full bg-amber-500 text-black text-base font-black py-3.5 rounded-xl transition-all shadow-lg hover:bg-amber-400">Add Trade</button>
            <button type="button" onclick="hideAddTradeForm()" class="w-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-base font-bold py-3.5 rounded-xl hover:bg-zinc-800 transition-all">Cancel</button>
          </div>
        </div>
      </section>

    </main>

    <!-- ================= BOTTOM NAVIGATION BAR (แถบเมนูด้านล่างสไตล์เรียบหรู) ================= -->
    <nav class="absolute bottom-0 left-0 right-0 h-20 bg-black border-t border-zinc-900 flex justify-around items-center px-2 z-50">
      <button onclick="changeMenuTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center space-y-1 text-amber-400">
        <span class="text-xl">📊</span>
        <span class="text-[10px] font-bold tracking-wider">Dashboard</span>
      </button>
      <button onclick="changeMenuTab('calendar')" id="nav-calendar" class="flex flex-col items-center space-y-1 text-zinc-600">
        <span class="text-xl">📅</span>
        <span class="text-[10px] font-bold tracking-wider">Calendar</span>
      </button>
      <button onclick="changeMenuTab('trades')" id="nav-trades" class="flex flex-col items-center space-y-1 text-zinc-600">
        <span class="text-xl">📋</span>
        <span class="text-[10px] font-bold tracking-wider">Trades</span>
      </button>
      <button onclick="changeMenuTab('settings')" id="nav-settings" class="flex flex-col items-center space-y-1 text-zinc-600">
        <span class="text-xl">⚙️</span>
        <span class="text-[10px] font-bold tracking-wider">Settings</span>
      </button>
    </nav>

  </div>

  <!-- ================= CORE DATABASE LOGIC (FIREBASE CONNECTION) ================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // กำหนดค่าคอนฟิกเชื่อมต่อฐานข้อมูลตามเดิม
    const firebaseConfig = {
      apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
      authDomain: "pocketflow-49763.firebaseapp.com",
      projectId: "pocketflow-49763",
      storageBucket: "pocketflow-49763.firebasestorage.app",
      messagingSenderId: "213638502575",
      appId: "1:213638502575:web:6028d33bead869f0405c5a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDataType = 'STOCK';
    let currentTradeType = 'BUY';
    let allTransactions = [];

    // กำหนดค่าเริ่มต้นให้กับวันที่ในฟอร์ม
    document.getElementById('trade-date').value = new Date().toISOString().split('T')[0];

    // หมวดหมู่รายจ่ายในบ้านตามการตั้งค่าเดิมของคุณ
    const customCategories = {
      "🔧 ซ่อมบำรุง": ["รถยนต์", "มอเตอร์ไซค์"],
      "⚡ สาธารณูปโภค": ["ค่าไฟฟ้า", "ค่าน้ำประปา", "ค่าส่วนกลาง"],
      "🛡️ ประกันและภาษี": ["ภาษีรถยนต์", "ค่าประกันภัย"]
    };

    // --- ฟังก์ชันควบคุมและสลับมุมมองหน้าจอ ---
    window.showAddTradeForm = function() {
      document.getElementById('view-dashboard').classList.add('hidden');
      document.getElementById('view-add-trade').classList.remove('hidden');
    }
    window.hideAddTradeForm = function() {
      document.getElementById('view-dashboard').classList.remove('hidden');
      document.getElementById('view-add-trade').classList.add('hidden');
    }

    window.changeMenuTab = function(tabName) {
      document.querySelectorAll('nav border button, nav button').forEach(btn => btn.className = 'flex flex-col items-center space-y-1 text-zinc-600');
      document.getElementById(`nav-${tabName}`).className = 'flex flex-col items-center space-y-1 text-amber-400';
      if(tabName === 'dashboard') hideAddTradeForm();
    }

    // --- ระบบควบคุมฟอร์มบันทึกรายการข้อมูลภายในแอป ---
    window.switchDataType = function(type) {
      currentDataType = type;
      document.getElementById('dtype-STOCK').className = type === 'STOCK' ? 'py-2 rounded-lg font-black text-xs bg-zinc-800 text-white shadow-sm transition-all' : 'py-2 rounded-lg font-bold text-xs text-zinc-500 transition-all';
      document.getElementById('dtype-EXPENSE').className = type === 'EXPENSE' ? 'py-2 rounded-lg font-black text-xs bg-zinc-800 text-white shadow-sm transition-all' : 'py-2 rounded-lg font-bold text-xs text-zinc-500 transition-all';
      
      if(type === 'STOCK') {
        document.getElementById('box-symbol').classList.remove('hidden');
        document.getElementById('box-categories').classList.add('hidden');
        document.getElementById('box-trade-type').classList.remove('hidden');
        document.getElementById('box-optional-wrapper').classList.remove('hidden');
        document.getElementById('lbl-main-amount').innerText = 'Profit/Loss';
      } else {
        document.getElementById('box-symbol').classList.add('hidden');
        document.getElementById('box-categories').classList.remove('hidden');
        document.getElementById('box-trade-type').classList.add('hidden');
        document.getElementById('box-optional-wrapper').classList.add('hidden');
        document.getElementById('lbl-main-amount').innerText = 'จำนวนเงินจ่าย (บาท)';
        setupExpenseDropdowns();
      }
    }

    window.setTradeType = function(type) {
      currentTradeType = type;
      document.querySelectorAll('#box-trade-type button').forEach(b => b.className = 'py-2.5 rounded-xl font-bold text-sm bg-zinc-900 border border-zinc-800 text-zinc-400 transition-all');
      
      const styles = {
        'BUY': 'bg-emerald-600 text-white shadow-md font-black',
        'SELL': 'bg-rose-600 text-white shadow-md font-black',
        'DIVIDEND': 'bg-amber-400 text-black shadow-md font-black'
      };
      document.getElementById(`ttype-${type}`).className = `py-2.5 rounded-xl text-sm ${styles[type]} transition-all`;
    }

    window.toggleOptionalFields = function() {
      const el = document.getElementById('optional-fields');
      const arrow = document.getElementById('optional-arrow');
      el.classList.toggle('open');
      arrow.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function setupExpenseDropdowns() {
      const mSelect = document.getElementById('exp-main-cat');
      const sSelect = document.getElementById('exp-sub-cat');
      mSelect.innerHTML = '';
      Object.keys(customCategories).forEach(m => mSelect.innerHTML += `<option value="${m}">${m}</option>`);
      
      const updateSubs = () => {
        sSelect.innerHTML = '';
        customCategories[mSelect.value].forEach(s => sSelect.innerHTML += `<option value="${s}">${s}</option>`);
      };
      mSelect.onchange = updateSubs;
      updateSubs();
    }

    // --- การส่งข้อมูลเข้าคลังเก็บข้อมูลส่วนตัวบนคลาวด์ ---
    document.getElementById('btn-save-trade').addEventListener('click', async () => {
      const amount = parseFloat(document.getElementById('trade-amount').value);
      const date = document.getElementById('trade-date').value;
      if(!amount || !date) { alert('กรุณาระบุตัวเลขหลักและวันที่ของธุรกรรมให้ครบถ้วนก่อนบันทึกครับ'); return; }

      if(currentDataType === 'STOCK') {
        const symbol = document.getElementById('trade-symbol').value.trim().toUpperCase();
        if(!symbol) { alert('กรุณาระบุชื่อย่อหุ้นด้วยครับ'); return; }
        
        await addDoc(collection(db, "transactions"), {
          symbol, type: currentTradeType, total: amount, date, isStock: true,
          entryPrice: parseFloat(document.getElementById('opt-entry-price').value) || 0,
          exitPrice: parseFloat(document.getElementById('opt-exit-price').value) || 0,
          lotSize: parseFloat(document.getElementById('opt-lot-size').value) || 0,
          exitDate: document.getElementById('opt-exit-date').value || '',
          notes: document.getElementById('opt-notes').value.trim()
        });
        document.getElementById('trade-symbol').value = '';
      } else {
        const mCat = document.getElementById('exp-main-cat').value;
        const sCat = document.getElementById('exp-sub-cat').value;
        await addDoc(collection(db, "household_expenses"), {
          category: `${mCat} (${sCat})`, mainCat: mCat, subCat: sCat, amount, date, isStock: false
        });
      }

      document.getElementById('trade-amount').value = '';
      document.getElementById('opt-entry-price').value = '';
      document.getElementById('opt-exit-price').value = '';
      document.getElementById('opt-lot-size').value = '';
      document.getElementById('opt-exit-date').value = '';
      document.getElementById('opt-notes').value = '';
      hideAddTradeForm();
    });

    // ตรวจจับและดึงประวัติความเคลื่อนไหวจากคลาวด์แบบทันท่วงที
    onSnapshot(collection(db, "transactions"), (snap) => {
      allTransactions = allTransactions.filter(t => !t.isStock);
      snap.forEach(d => allTransactions.push({id: d.id, ...d.data()}));
      processAndRender();
    });
    onSnapshot(collection(db, "household_expenses"), (snap) => {
      allTransactions = allTransactions.filter(t => t.isStock);
      snap.forEach(d => allTransactions.push({id: d.id, ...d.data()}));
      processAndRender();
    });

    // --- การคำนวณและประมวลผลรายงานผลแยกชื่อหุ้น กำไรขาดทุน ---
    function processAndRender() {
      let netPnL = 0;
      let totalDiv = 0;
      let totalExp = 0;
      let stockMap = {};

      allTransactions.forEach(item => {
        if(item.isStock) {
          if(!stockMap[item.symbol]) {
            stockMap[item.symbol] = { pnl: 0, div: 0, count: 0 };
          }
          if(item.type === 'BUY') {
            stockMap[item.symbol].pnl -= item.total;
            netPnL -= item.total;
          } else if(item.type === 'SELL') {
            stockMap[item.symbol].pnl += item.total;
            netPnL += item.total;
          } else if(item.type === 'DIVIDEND') {
            stockMap[item.symbol].div += item.total;
            totalDiv += item.total;
          }
          stockMap[item.symbol].count++;
        } else {
          totalExp += item.amount;
        }
      });

      document.getElementById('total-pnl-display').innerText = `฿${netPnL.toLocaleString('th-TH', {minimumFractionDigits:2})}`;
      document.getElementById('total-div-display').innerText = `฿${totalDiv.toLocaleString('th-TH', {minimumFractionDigits:2})}`;
      document.getElementById('total-exp-display').innerText = `฿${totalExp.toLocaleString('th-TH', {minimumFractionDigits:2})}`;

      const rList = document.getElementById('stock-report-list');
      rList.innerHTML = '';

      for(const [symbol, data] of Object.entries(stockMap)) {
        const pnlColor = data.pnl >= 0 ? 'text-emerald-400' : 'text-rose-500';
        const pnlSign = data.pnl >= 0 ? '+' : '';
        rList.innerHTML += `
          <div class="bg-zinc-900 border border-zinc-800/80 p-4 rounded-xl flex justify-between items-center shadow-md">
            <div>
              <p class="text-base font-black text-white tracking-wide">${symbol}</p>
              <p class="text-[11px] text-zinc-500 font-bold mt-0.5">รวม: ${data.count} รายการ</p>
            </div>
            <div class="text-right">
              <p class="${pnlColor} font-black text-sm">${pnlSign}฿${data.pnl.toFixed(2)}</p>
              <p class="text-xs font-bold text-amber-400 mt-0.5">ปันผล: ฿${data.div.toFixed(2)}</p>
            </div>
          </div>`;
      }

      if(Object.keys(stockMap).length === 0) {
        rList.innerHTML = `
          <div class="text-center py-12 border border-dashed border-zinc-800 rounded-2xl bg-zinc-950">
            <span class="text-3xl block mb-2 opacity-40">📊</span>
            <p class="text-zinc-500 font-black text-sm">No trading data yet</p>
            <p class="text-xs text-zinc-600 mt-1">Start adding trades to see your statistics</p>
          </div>`;
      }
    }
  </script>
</body>
</html>
