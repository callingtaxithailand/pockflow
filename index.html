<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow - All-in-One</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        .btn-save { background: #ffb300; width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; color: #000; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #ccc; }
        th, td { border-bottom: 1px solid #333; padding: 10px; text-align: left; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h2>Dashboard</h2>
        <div style="background: #1a1a1a; padding: 20px; border-radius: 15px;">ยอดรวมพอร์ต: ฿0.00</div>
        <button class="btn-save" onclick="showPage('page-form')">+ บันทึกรายการใหม่</button>
    </div>

    <div id="page-form" class="page">
        <h2>บันทึกธุรกรรม</h2>
        <select id="type"><option>ซื้อหุ้น</option><option>ขายหุ้น</option><option>รับเงินปันผล</option></select>
        <input type="date" style="margin: 10px 0; width: 100%; padding: 10px;">
        <input type="text" placeholder="ชื่อหุ้น" style="width: 100%; padding: 10px;">
        <input type="number" placeholder="ราคา" style="margin-top: 10px; width: 100%; padding: 10px;">
        <button class="btn-save" onclick="saveData()">บันทึก</button>
    </div>

    <div id="page-report" class="page">
        <h2>รายงานการซื้อขาย/ปันผล</h2>
        <table>
            <thead><tr><th>ประเภท</th><th>หุ้น</th><th>ราคา</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showPage('page-home')">📊 แดชบอร์ด</div>
        <div class="nav-item" onclick="showPage('page-report')">📈 รายงาน</div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function saveData() {
            alert("บันทึกสำเร็จ!");
            showPage('page-report');
        }
    </script>
</body>
</html>
