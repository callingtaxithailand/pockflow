<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Stock Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background-color: #111; }
        .nav-btn { cursor: pointer; padding: 10px 20px; margin-right: 10px; background: #333; color: white; border: none; }
        .active { background: #007bff; }
        .content-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <nav>
        <button class="nav-btn" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" onclick="showSection('foreign')">หุ้นต่างประเทศ</button>
        <button class="nav-btn" onclick="showSection('gold')">เทรดทอง</button>
    </nav>

    <div id="thai" class="content-section">
        <h2>หุ้นไทย</h2>
        <table>
            <tr><th>ชื่อหุ้น</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>PTT</td><td>100</td><td>3,500</td></tr>
        </table>
    </div>

    <div id="foreign" class="content-section">
        <h2>หุ้นต่างประเทศ</h2>
        <table>
            <tr><th>ชื่อหุ้น</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>AAPL</td><td>10</td><td>7,000</td></tr>
        </table>
    </div>

    <div id="gold" class="content-section">
        <h2>เทรดทอง</h2>
        <table>
            <tr><th>ชื่อรายการ</th><th>จำนวน</th><th>ราคารวม</th></tr>
            <tr><td>Gold Spot</td><td>1</td><td>65,000</td></tr>
        </table>
    </div>
</div>

<script>
    function showSection(id) {
        // ซ่อนทุกส่วน
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        // แสดงส่วนที่เลือก
        document.getElementById(id).style.display = 'block';
        // บันทึกสถานะลง LocalStorage
        localStorage.setItem('activePage', id);
    }

    // ฟังก์ชันเช็คหน้าเมื่อโหลดหน้าเว็บ (แก้ปัญหา F5)
    window.onload = () => {
        const savedPage = localStorage.getItem('activePage') || 'thai';
        showSection(savedPage);
    };
</script>

</body>
</html>
