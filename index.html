<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketFlow - ระบบบันทึกธุรกรรม</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .page { display: none; }
        .active { display: block; }
        
        /* Dashboard */
        .total-card { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { padding: 15px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; text-align: center; }

        /* Form */
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #aaa; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .btn-save { background: #ffb300; width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; color: #000; margin-top: 10px; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <h2>Dashboard</h2>
        <div class="total-card"><div>มูลค่าพอร์ตสุทธิ</div><div style="font-size: 2rem; font-weight: bold;">฿0.00</div></div>
        <div class="grid">
            <div class="card">เงินปันผล<br><b>฿0</b></div><div class="card">กำไรขายหุ้น<br><b>฿0</b></div>
        </div>
        <button class="btn-save" onclick="showPage('page-form')">+ บันทึกรายการใหม่</button>
    </div>

    <div id="page-form" class="page">
        <h2>บันทึกธุรกรรม</h2>
        <div class="form-group"><label>ประเภทรายการ</label>
            <select>
                <option>ซื้อหุ้น</option>
                <option>ขายหุ้น</option>
                <option>รับเงินปันผล</option>
            </select>
        </div>
        <div class="form-group"><label>วันที่</label><input type="date"></div>
        <div class="form-group"><label>ชื่อหุ้น</label><input type="text" placeholder="เช่น TISCO, VOO"></div>
        <div class="form-group"><label>จำนวนเงิน</label><input type="number" placeholder="0.00"></div>
        <button class="btn-save" onclick="showPage('page-home')">บันทึกข้อมูล</button>
    </div>

    <div class="nav-bar">
        <div onclick="showPage('page-home')">📊 แดชบอร์ด</div>
        <div onclick="showPage('page-form')">📝 บันทึก</div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
