<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Pro</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; font-weight: 500; }
        h1, h2, h3, th { color: #00d4ff; font-weight: 800; } /* สี Neon Blue และตัวหนาพิเศษ */
        
        .container { max-width: 600px; margin: auto; }
        .summary-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #007bff; }
        
        .nav-btn { flex: 1; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .active { background: #007bff; border-color: #007bff; color: white; font-weight: 800; box-shadow: 0 0 10px #007bff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #333; padding: 12px 8px; text-align: left; }
        .clickable { color: #00d4ff; text-decoration: underline; cursor: pointer; font-weight: 700; }
        
        #add-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background-color: #ff007f; border-radius: 50%; border: none; color: white; font-size: 35px; z-index: 100; font-weight: 800; cursor: pointer; box-shadow: 0 0 15px #ff007f; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 200; }
        /* ฟอร์มหนาขึ้น 15% */
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 2px solid #555; color: #fff; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; font-weight: 700; font-size: 1.1rem; }
        label { color: #aaa; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button class="nav-btn" id="btn-thai" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" id="btn-foreign" onclick="showSection('foreign')">ตปท</button>
        <button class="nav-btn" id="btn-gold" onclick="showSection('gold')">ทอง</button>
    </div>

    <div class="summary-box">
        <div style="color: #00d4ff;">รวมยอดซื้อ: <span id="sum-buy" style="color: #fff;">0</span></div>
        <div style="color: #00d4ff;">รวมปันผลทั้งหมด: <span id="sum-div" style="color: #fff;">0</span></div>
    </div>

    <div id="content-area"></div>
</div>

<button id="add-btn" onclick="openModal('modal-add')">+</button>

<div id="modal-add" class="modal">
    <h3 style="color:#00d4ff;">เพิ่มธุรกรรมใหม่</h3>
    <label>วันที่</label><input type="date" id="date">
    <label>ประเภทรายการ</label>
    <select id="type-select">
        <option value="buy">ซื้อหุ้น</option>
        <option value="sell">ขายหุ้น</option>
        <option value="dividend">รับเงินปันผล</option>
    </select>
    <label>ชื่อหุ้น</label><input type="text" id="name" placeholder="ชื่อหุ้น...">
    <label>จำนวนหุ้น</label><input type="number" id="qty" placeholder="ระบุจำนวน...">
    <label>จำนวนเงิน</label><input type="number" id="price" placeholder="ระบุจำนวนเงิน...">
    <button class="nav-btn" onclick="saveData()" style="width:100%; background:#007bff; font-size: 1.1rem; font-weight:800;">บันทึกข้อมูล</button>
    <button class="nav-btn" onclick="closeModal('modal-add')" style="width:100%; margin-top:10px; background:#444;">ยกเลิก</button>
</div>

<div id="modal-detail" class="modal">
    <h3 id="detail-title" style="color:#ff007f;"></h3>
    <div id="detail-content" style="font-weight:600;"></div>
    <hr style="border: 0; border-top: 2px solid #333; margin: 20px 0;">
    <h4 id="detail-summary-div" style="color:#00d4ff;"></h4>
    <button class="nav-btn" onclick="closeModal('modal-detail')" style="width:100%; background:#444;">ปิดหน้าต่าง</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function showSection(type) {
        localStorage.setItem('activePage', type);
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        
        let filtered = data.filter(i => i.category === type);
        let html = `<table><tr><th>หุ้น</th><th>ยอดซื้อ</th><th>ปันผล</th></tr>`;
        let grouped = {};
        filtered.forEach(i => {
            if(!grouped[i.name]) grouped[i.name] = { buy: 0, div: 0 };
            if(i.txType === 'buy') grouped[i.name].buy += Number(i.price);
            if(i.txType === 'dividend') grouped[i.name].div += Number(i.price);
        });

        for(let name in grouped) {
            html += `<tr><td class="clickable" onclick="showDetail('${name}')">${name}</td><td>${grouped[name].buy}</td><td>${grouped[name].div}</td></tr>`;
        }
        document.getElementById('content-area').innerHTML = html + `</table>`;
        document.getElementById('sum-buy').innerText = filtered.filter(i => i.txType === 'buy').reduce((s, i) => s + Number(i.price), 0);
        document.getElementById('sum-div').innerText = filtered.filter(i => i.txType === 'dividend').reduce((s, i) => s + Number(i.price), 0);
    }

    function showDetail(name) {
        let items = data.filter(i => i.name === name);
        let totalDiv = items.filter(i => i.txType === 'dividend').reduce((s, i) => s + Number(i.price), 0);
        document.getElementById('detail-title').innerText = "รายการของ: " + name;
        document.getElementById('detail-content').innerHTML = `<ul>` + items.map(i => `<li>${i.date} | ${i.txType} | ${i.price} บาท</li>`).join('') + `</ul>`;
        document.getElementById('detail-summary-div').innerText = "รวมปันผลทั้งหมด: " + totalDiv + " บาท";
        openModal('modal-detail');
    }

    function saveData() {
        const item = {
            id: Date.now(),
            category: localStorage.getItem('activePage') || 'thai',
            txType: document.getElementById('type-select').value,
            date: document.getElementById('date').value,
            name: document.getElementById('name').value,
            qty: document.getElementById('qty').value,
            price: document.getElementById('price').value
        };
        data.push(item);
        localStorage.setItem('myPortfolio', JSON.stringify(data));
        closeModal('modal-add');
        showSection(item.category);
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    window.onload = () => showSection(localStorage.getItem('activePage') || 'thai');
</script>
</body>
</html>
