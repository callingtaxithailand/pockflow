<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Manager</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCybJyauuHOPTtdH-PSM5QsVM25ePyuymE",
            authDomain: "pocketflow-49763.firebaseapp.com",
            projectId: "pocketflow-49763",
            storageBucket: "pocketflow-49763.firebasestorage.app",
            messagingSenderId: "213638502575",
            appId: "1:213638502575:web:6028d33bead869f0405c5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // ทำให้ฟังก์ชันต่างๆ เรียกใช้ได้จากหน้า HTML
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.query = query;
        window.where = where;
        window.orderBy = orderBy;
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .nav-btn { flex: 1; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; cursor: pointer; }
        .active { background: #007bff; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #555; color: #fff; border-radius: 5px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); padding:20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>พอร์ตการลงทุน</h1>
    <div style="display: flex; gap: 5px;">
        <button class="nav-btn" onclick="showSection('thai')">หุ้นไทย</button>
        <button class="nav-btn" onclick="showSection('foreign')">ตปท</button>
        <button class="nav-btn" onclick="showSection('gold')">ทอง</button>
    </div>
    <div id="content-area" style="margin-top:20px;">กำลังโหลด...</div>
</div>

<button id="add-btn" onclick="document.getElementById('modal').style.display='block'" style="position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; background:#ff007f; border:none; color:white; font-size:24px;">+</button>

<div id="modal" class="modal">
    <h3>เพิ่มธุรกรรม</h3>
    <input type="date" id="date">
    <select id="type-select"><option value="buy">ซื้อ</option><option value="sell">ขาย</option></select>
    <input type="text" id="name" placeholder="ชื่อ">
    <input type="number" id="price" placeholder="เงิน">
    <button onclick="saveData()" style="width:100%; padding:10px; background:#007bff; border:none; color:white;">บันทึก</button>
    <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px;">ปิด</button>
</div>

<script>
    let currentCategory = 'thai';

    async function showSection(cat) {
        currentCategory = cat;
        const q = query(collection(window.db, "portfolio"), where("category", "==", cat));
        const querySnapshot = await getDocs(q);
        
        let html = "<table><tr><th>วันที่</th><th>ชื่อ</th><th>เงิน</th></tr>";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            html += `<tr><td>${data.date}</td><td>${data.name}</td><td>${data.price}</td></tr>`;
        });
        document.getElementById('content-area').innerHTML = html + "</table>";
    }

    async function saveData() {
        await addDoc(collection(window.db, "portfolio"), {
            category: currentCategory,
            date: document.getElementById('date').value,
            txType: document.getElementById('type-select').value,
            name: document.getElementById('name').value,
            price: Number(document.getElementById('price').value)
        });
        document.getElementById('modal').style.display = 'none';
        showSection(currentCategory);
    }

    window.onload = () => showSection('thai');
</script>
</body>
</html>
